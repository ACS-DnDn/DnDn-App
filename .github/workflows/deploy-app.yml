name: Build App Images

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated apps to build (api,worker,report,web) or "all"'
        required: false
        default: 'all'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'contracts/payload/job_payload.schema.json'
      - 'contracts/canonical_model.schema.json'
      - 'contracts/event_model.schema.json'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── 변경된 앱 감지 ─────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.result.outputs.api }}
      worker:  ${{ steps.result.outputs.worker }}
      report:  ${{ steps.result.outputs.report }}
      web:     ${{ steps.result.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:    ['apps/api/**']
            worker:
              - 'apps/worker/**'
              - 'contracts/payload/job_payload.schema.json'
              - 'contracts/canonical_model.schema.json'
              - 'contracts/event_model.schema.json'
            report: ['apps/report/**']
            web:    ['apps/web/**']

      - name: Resolve targets
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.apps }}"
            api=false; worker=false; report=false; web=false
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              api=true; worker=true; report=true; web=true
            else
              [[ "$INPUT" == *api* ]]    && api=true
              [[ "$INPUT" == *worker* ]] && worker=true
              [[ "$INPUT" == *report* ]] && report=true
              [[ "$INPUT" == *web* ]]    && web=true
            fi
            echo "api=$api" >> "$GITHUB_OUTPUT"
            echo "worker=$worker" >> "$GITHUB_OUTPUT"
            echo "report=$report" >> "$GITHUB_OUTPUT"
            echo "web=$web" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
            echo "report=${{ steps.filter.outputs.report }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
          fi

  # ── API ───────────────────────────────────────────────────────────────
  publish-api:
    name: Publish API Image
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-api:${{ github.sha }}
          docker build -t $IMAGE apps/api/
          docker push $IMAGE
          echo "API image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"

  # ── Worker ────────────────────────────────────────────────────────────
  publish-worker:
    name: Publish Worker Image
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-worker:${{ github.sha }}
          docker build -f apps/worker/Dockerfile -t $IMAGE .
          docker push $IMAGE
          echo "Worker image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"

  # ── Report ────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Report Image
    needs: detect
    if: needs.detect.outputs.report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-report:${{ github.sha }}
          docker build -t $IMAGE apps/report/
          docker push $IMAGE
          echo "Report image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy units using this image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- dndn-report-api" >> "$GITHUB_STEP_SUMMARY"
          echo "- dndn-report-worker" >> "$GITHUB_STEP_SUMMARY"

  # ── Web ───────────────────────────────────────────────────────────────
  publish-web:
    name: Publish Web Image
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-web:${{ github.sha }}
          docker build -t $IMAGE apps/web/
          docker push $IMAGE
          echo "Web image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
