name: Build App Images

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated apps to build (api,worker,report,web) or "all"'
        required: false
        default: 'all'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'contracts/payload/job_payload.schema.json'
      - 'contracts/canonical_model.schema.json'
      - 'contracts/event_model.schema.json'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com
  BASTION_HOST: 13.124.119.204

jobs:
  # ── 변경된 앱 감지 ─────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.result.outputs.api }}
      worker:  ${{ steps.result.outputs.worker }}
      report:  ${{ steps.result.outputs.report }}
      web:     ${{ steps.result.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:    ['apps/api/**']
            worker:
              - 'apps/worker/**'
              - 'contracts/payload/job_payload.schema.json'
              - 'contracts/canonical_model.schema.json'
              - 'contracts/event_model.schema.json'
            report: ['apps/report/**']
            web:    ['apps/web/**']

      - name: Resolve targets
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.apps }}"
            api=false; worker=false; report=false; web=false
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              api=true; worker=true; report=true; web=true
            else
              [[ "$INPUT" == *api* ]]    && api=true
              [[ "$INPUT" == *worker* ]] && worker=true
              [[ "$INPUT" == *report* ]] && report=true
              [[ "$INPUT" == *web* ]]    && web=true
            fi
            echo "api=$api" >> "$GITHUB_OUTPUT"
            echo "worker=$worker" >> "$GITHUB_OUTPUT"
            echo "report=$report" >> "$GITHUB_OUTPUT"
            echo "web=$web" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
            echo "report=${{ steps.filter.outputs.report }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
          fi

  # ── API ───────────────────────────────────────────────────────────────
  publish-api:
    name: Publish API Image
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-api
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/api/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "API image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Worker ────────────────────────────────────────────────────────────
  publish-worker:
    name: Publish Worker Image
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-worker
          docker build -f apps/worker/Dockerfile -t $REPO:${{ github.sha }} -t $REPO:latest .
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Worker image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Report ────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Report Image
    needs: detect
    if: needs.detect.outputs.report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-report
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/report/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Report image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Web ───────────────────────────────────────────────────────────────
  publish-web:
    name: Publish Web Image
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-web
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/web/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Web image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy: 빌드된 앱 자동 롤아웃 ──────────────────────────────────────
  deploy:
    name: Rollout Restart
    needs: [detect, publish-api, publish-worker, publish-report, publish-web]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion.pem
          chmod 600 ~/.ssh/bastion.pem
          ssh-keyscan -H ${{ env.BASTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rollout restart changed apps
        run: |
          SSH="ssh -i ~/.ssh/bastion.pem -o StrictHostKeyChecking=no ec2-user@${{ env.BASTION_HOST }}"
          APPS=""
          if [ "${{ needs.detect.outputs.api }}" = "true" ] && [ "${{ needs.publish-api.result }}" = "success" ]; then
            APPS="$APPS deployment/dndn-api -n dndn-api"
          fi
          if [ "${{ needs.detect.outputs.worker }}" = "true" ] && [ "${{ needs.publish-worker.result }}" = "success" ]; then
            APPS="$APPS deployment/dndn-worker -n dndn-worker"
          fi
          if [ "${{ needs.detect.outputs.report }}" = "true" ] && [ "${{ needs.publish-report.result }}" = "success" ]; then
            APPS="$APPS deployment/dndn-report -n dndn-report"
          fi
          if [ "${{ needs.detect.outputs.web }}" = "true" ] && [ "${{ needs.publish-web.result }}" = "success" ]; then
            APPS="$APPS deployment/dndn-web -n dndn-web"
          fi
          if [ -z "$APPS" ]; then
            echo "No apps to deploy"
            exit 0
          fi
          # Rollout restart each app
          for pair in api worker report web; do
            case "$pair" in
              api)    [ "${{ needs.detect.outputs.api }}" = "true" ] && [ "${{ needs.publish-api.result }}" = "success" ] && $SSH "kubectl rollout restart deployment/dndn-api -n dndn-api" && echo "✓ api" ;;
              worker) [ "${{ needs.detect.outputs.worker }}" = "true" ] && [ "${{ needs.publish-worker.result }}" = "success" ] && $SSH "kubectl rollout restart deployment/dndn-worker -n dndn-worker" && echo "✓ worker" ;;
              report) [ "${{ needs.detect.outputs.report }}" = "true" ] && [ "${{ needs.publish-report.result }}" = "success" ] && $SSH "kubectl rollout restart deployment/dndn-report -n dndn-report" && echo "✓ report" ;;
              web)    [ "${{ needs.detect.outputs.web }}" = "true" ] && [ "${{ needs.publish-web.result }}" = "success" ] && $SSH "kubectl rollout restart deployment/dndn-web -n dndn-web" && echo "✓ web" ;;
            esac
          done

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/bastion.pem
