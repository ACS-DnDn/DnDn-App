name: Build App Images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'contracts/payload/job_payload.schema.json'
      - 'contracts/canonical_model.schema.json'
      - 'contracts/event_model.schema.json'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── 변경된 앱 감지 ─────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.filter.outputs.api }}
      worker:  ${{ steps.filter.outputs.worker }}
      report:  ${{ steps.filter.outputs.report }}
      web:     ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:    ['apps/api/**']
            worker:
              - 'apps/worker/**'
              - 'contracts/payload/job_payload.schema.json'
              - 'contracts/canonical_model.schema.json'
              - 'contracts/event_model.schema.json'
            report: ['apps/report/**']
            web:    ['apps/web/**']

  # ── API ───────────────────────────────────────────────────────────────
  publish-api:
    name: Publish API Image
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-api:${{ github.sha }}
          docker build -t $IMAGE apps/api/
          docker push $IMAGE
          echo "API image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"

  # ── Worker ────────────────────────────────────────────────────────────
  publish-worker:
    name: Publish Worker Image
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-worker:${{ github.sha }}
          docker build -f apps/worker/Dockerfile -t $IMAGE .
          docker push $IMAGE
          echo "Worker image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"

  # ── Report ────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Report Image
    needs: detect
    if: needs.detect.outputs.report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-report:${{ github.sha }}
          docker build -t $IMAGE apps/report/
          docker push $IMAGE
          echo "Report image: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy units using this image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- dndn-report-api" >> "$GITHUB_STEP_SUMMARY"
          echo "- dndn-report-worker" >> "$GITHUB_STEP_SUMMARY"

  # ── Web ───────────────────────────────────────────────────────────────
  # Web Dockerfile은 프론트 담당 브랜치에서 별도로 정리 중이므로
  # 이 브랜치에서는 image publish job을 잠시 비활성화합니다.
