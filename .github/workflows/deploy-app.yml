  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Configure AWS credentials (OIDC)
  #       uses: aws-actions/configure-aws-credentials@v4
  #       with:
  #         role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
  #         aws-region: ${{ env.AWS_REGION }}
