name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'contracts/payload/job_payload.schema.json'
      - 'contracts/canonical_model.schema.json'
      - 'contracts/event_model.schema.json'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com
  EKS_CLUSTER: dndn-prd

jobs:
  # ── 변경된 앱 감지 ─────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.filter.outputs.api }}
      worker:  ${{ steps.filter.outputs.worker }}
      report:  ${{ steps.filter.outputs.report }}
      web:     ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:    ['apps/api/**']
            worker:
              - 'apps/worker/**'
              - 'contracts/payload/job_payload.schema.json'
              - 'contracts/canonical_model.schema.json'
              - 'contracts/event_model.schema.json'
            report: ['apps/report/**']
            web:    ['apps/web/**']

  # ── 공통: AWS 인증 + EKS kubeconfig ───────────────────────────────────
  # (각 job에서 재사용 — GitHub Actions는 job 간 공유가 안 되므로 각 job에 포함)

  # ── API ───────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-api:${{ github.sha }}
          docker build -t $IMAGE apps/api/
          docker push $IMAGE

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install dndn-api k8s/helm/apps/api \
            --namespace dndn-api --create-namespace \
            --set image.tag=${{ github.sha }}

  # ── Worker ────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-worker:${{ github.sha }}
          docker build -f apps/worker/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install dndn-worker k8s/helm/apps/worker \
            --namespace dndn-worker --create-namespace \
            --set image.tag=${{ github.sha }}

  # ── Report ────────────────────────────────────────────────────────────
  deploy-report:
    name: Deploy Report
    needs: detect
    if: needs.detect.outputs.report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-report:${{ github.sha }}
          docker build -t $IMAGE apps/report/
          docker push $IMAGE

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install dndn-report k8s/helm/apps/report \
            --namespace dndn-report --create-namespace \
            --set image.tag=${{ github.sha }}

  # ── Web ───────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/dndn-prd-web:${{ github.sha }}
          docker build -t $IMAGE apps/web/
          docker push $IMAGE

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install dndn-web k8s/helm/apps/web \
            --namespace dndn-web --create-namespace \
            --set image.tag=${{ github.sha }}
