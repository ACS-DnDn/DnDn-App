name: Build App Images

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated apps to build (api,worker,report,web) or "all"'
        required: false
        default: 'all'
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'contracts/payload/job_payload.schema.json'
      - 'contracts/canonical_model.schema.json'
      - 'contracts/event_model.schema.json'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── 변경된 앱 감지 ─────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.result.outputs.api }}
      worker:  ${{ steps.result.outputs.worker }}
      report:  ${{ steps.result.outputs.report }}
      web:     ${{ steps.result.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:    ['apps/api/**']
            worker:
              - 'apps/worker/**'
              - 'contracts/payload/job_payload.schema.json'
              - 'contracts/canonical_model.schema.json'
              - 'contracts/event_model.schema.json'
            report: ['apps/report/**']
            web:    ['apps/web/**']

      - name: Resolve targets
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.apps }}"
            api=false; worker=false; report=false; web=false
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              api=true; worker=true; report=true; web=true
            else
              [[ "$INPUT" == *api* ]]    && api=true
              [[ "$INPUT" == *worker* ]] && worker=true
              [[ "$INPUT" == *report* ]] && report=true
              [[ "$INPUT" == *web* ]]    && web=true
            fi
            echo "api=$api" >> "$GITHUB_OUTPUT"
            echo "worker=$worker" >> "$GITHUB_OUTPUT"
            echo "report=$report" >> "$GITHUB_OUTPUT"
            echo "web=$web" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
            echo "report=${{ steps.filter.outputs.report }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
          fi

  # ── API 단위 테스트 ───────────────────────────────────────────────────
  test-api:
    name: Test API
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-test.txt

      - name: Run tests
        run: python -m pytest apps/api/tests/ -v --tb=short --junit-xml=test-results/junit.xml
        env:
          PYTHONPATH: .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-${{ github.sha }}
          path: test-results/junit.xml
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "## API 단위 테스트 결과" >> "$GITHUB_STEP_SUMMARY"
          python - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
            tree = ET.parse("test-results/junit.xml")
            suite = tree.getroot()
            tests   = suite.get("tests", "?")
            failures = suite.get("failures", "0")
            errors   = suite.get("errors", "0")
            skipped  = suite.get("skipped", "0")
            passed   = int(tests) - int(failures) - int(errors) - int(skipped)
            icon = "✅" if int(failures) == 0 and int(errors) == 0 else "❌"
            print(f"{icon} **{passed}/{tests} passed** — failures: {failures}, errors: {errors}, skipped: {skipped}")
          except Exception as e:
            print(f"⚠️ 결과 파싱 실패: {e}")
          EOF
          >> "$GITHUB_STEP_SUMMARY"

  # ── API ───────────────────────────────────────────────────────────────
  publish-api:
    name: Publish API Image
    needs: [detect, test-api]
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-api
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/api/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "API image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Worker ────────────────────────────────────────────────────────────
  publish-worker:
    name: Publish Worker Image
    needs: detect
    if: needs.detect.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-worker
          docker build -f apps/worker/Dockerfile -t $REPO:${{ github.sha }} -t $REPO:latest .
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Worker image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Report ────────────────────────────────────────────────────────────
  publish-report:
    name: Publish Report Image
    needs: detect
    if: needs.detect.outputs.report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-report
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/report/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Report image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Web ───────────────────────────────────────────────────────────────
  publish-web:
    name: Publish Web Image
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-web
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest apps/web/
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "Web image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy: GitOps image tag 업데이트 → ArgoCD 자동 sync ────────────────
  update-gitops:
    name: Update GitOps manifests
    needs: [detect, test-api, publish-api, publish-worker, publish-report, publish-web]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra repo
        uses: actions/checkout@v4
        with:
          repository: ACS-DnDn/DnDn-Infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tags
        run: |
          SHA=${{ github.sha }}
          REGISTRY=${{ env.ECR_REGISTRY }}
          CHANGED=false

          update_tag() {
            local file="$1" old_image="$2" new_image="$3"
            if [ -f "$file" ]; then
              sed -i "s|${old_image}:.*|${new_image}:${SHA}|" "$file"
              CHANGED=true
              echo "✓ Updated $file → ${new_image}:${SHA}"
            fi
          }

          if [ "${{ needs.detect.outputs.api }}" = "true" ] && [ "${{ needs.publish-api.result }}" = "success" ]; then
            update_tag "gitops/environments/prod/apps/dndn-api/deployment.yaml" \
              "${REGISTRY}/dndn-prd-api" "${REGISTRY}/dndn-prd-api"
          fi
          if [ "${{ needs.detect.outputs.worker }}" = "true" ] && [ "${{ needs.publish-worker.result }}" = "success" ]; then
            update_tag "gitops/environments/prod/apps/dndn-worker/deployment.yaml" \
              "${REGISTRY}/dndn-prd-worker" "${REGISTRY}/dndn-prd-worker"
          fi
          if [ "${{ needs.detect.outputs.report }}" = "true" ] && [ "${{ needs.publish-report.result }}" = "success" ]; then
            update_tag "gitops/environments/prod/apps/dndn-report/deployment.yaml" \
              "${REGISTRY}/dndn-prd-report" "${REGISTRY}/dndn-prd-report"
          fi
          if [ "${{ needs.detect.outputs.web }}" = "true" ] && [ "${{ needs.publish-web.result }}" = "success" ]; then
            update_tag "gitops/environments/prod/apps/dndn-web/deployment.yaml" \
              "${REGISTRY}/dndn-prd-web" "${REGISTRY}/dndn-prd-web"
          fi

          if [ "$CHANGED" = "false" ]; then
            echo "No apps to update"
            exit 0
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(gitops): update image tags from DnDn-App@${GITHUB_SHA::7}"
          git push
