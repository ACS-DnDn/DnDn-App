name: API Unit Tests

on:
  pull_request:
    paths:
      - 'apps/api/**'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-test.txt

      - name: Run tests
        run: python -m pytest apps/api/tests/ -v --tb=short --junit-xml=test-results/junit.xml
        env:
          PYTHONPATH: .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-${{ github.sha }}
          path: test-results/junit.xml
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "## API 단위 테스트 결과" >> "$GITHUB_STEP_SUMMARY"
          python - >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          import xml.etree.ElementTree as ET
          try:
            root = ET.parse("test-results/junit.xml").getroot()
            suite = root.find("testsuite") if root.tag == "testsuites" else root
            if suite is None:
              suite = root
            tests    = int(suite.get("tests",    0))
            failures = int(suite.get("failures", 0))
            errors   = int(suite.get("errors",   0))
            skipped  = int(suite.get("skipped",  0))
            passed   = tests - failures - errors - skipped
            icon = "✅" if failures == 0 and errors == 0 else "❌"
            print(f"{icon} **{passed}/{tests} passed** — failures: {failures}, errors: {errors}, skipped: {skipped}")
          except Exception as e:
            print(f"⚠️ 결과 파싱 실패: {e}")
          EOF
