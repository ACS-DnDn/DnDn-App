name: Report Tests

on:
  push:
    paths:
      - "apps/report/**"
      - ".github/workflows/report-tests.yml"
  pull_request:
    paths:
      - "apps/report/**"
      - ".github/workflows/report-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    name: Run report pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run pytest
        working-directory: apps/report
        run: uv run pytest
