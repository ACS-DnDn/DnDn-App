name: Report Tests
# trigger on workflow file change (touch)
on:
  push:
    paths:
      - "apps/report/**"
      - ".github/workflows/report-tests.yml"
  pull_request:
    paths:
      - "apps/report/**"
      - ".github/workflows/report-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Run report pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.20"
          enable-cache: true
          cache-dependency-glob: |
            apps/report/uv.lock

      - name: Install dependencies
        working-directory: apps/report
        run: uv sync --frozen

      - name: Run pytest
        working-directory: apps/report
        run: uv run pytest
