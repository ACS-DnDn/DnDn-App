name: Worker Tests
# trigger on workflow file change (touch4)
on:
  push:
    paths:
      - "apps/worker/**"
      - "contracts/payload/job_payload.schema.json"
      - "contracts/canonical_model.schema.json"
      - "contracts/event_model.schema.json"
      - ".github/workflows/worker-tests.yml"
  pull_request:
    paths:
      - "apps/worker/**"
      - "contracts/payload/job_payload.schema.json"
      - "contracts/canonical_model.schema.json"
      - "contracts/event_model.schema.json"
      - ".github/workflows/worker-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Run worker pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'apps/worker[dev]'

      - name: Run tests
        working-directory: apps/worker
        run: pytest
