server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA - 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 서비스 프록시
    location /api/ {
        proxy_pass http://api-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Report 서비스 프록시
    location /todo/ {
        proxy_pass http://report-service:8000/todo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
