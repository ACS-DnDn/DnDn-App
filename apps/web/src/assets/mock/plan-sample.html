<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>작업계획서</title>
  <link rel="stylesheet" href="../css/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      font-size: 13px;
      line-height: 1.65;
      color: #1a1a1a;
      background: #fff;
    }

    .doc {
      background: #fff;
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 44px 52px;
    }

    /* ── 문서 헤더 ── */
    .doc-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 3px solid #1f3864;
      margin-bottom: 20px;
    }
    .doc-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .doc-header img { height: 28px; width: auto; display: block; }
    .doc-header-title {
      font-size: 19px;
      font-weight: 800;
      color: #1f3864;
      text-align: center;
      line-height: 1.4;
    }
    .doc-header-meta {
      text-align: right;
      font-size: 11px;
      color: #666;
      line-height: 1.75;
    }

    /* ── 문서 기본 정보 ── */
    .tbl-info {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #bbb;
      margin-bottom: 22px;
    }
    .tbl-info th {
      padding: 7px 11px;
      background: #f0f0f0;
      font-size: 11.5px;
      font-weight: 600;
      color: #444;
      border: 1px solid #bbb;
      white-space: nowrap;
      vertical-align: middle;
    }
    .tbl-info td {
      padding: 7px 11px;
      border: 1px solid #bbb;
      color: #1a1a1a;
      vertical-align: middle;
      font-size: 12.5px;
    }
    .tbl-info .td-main { font-weight: 700; font-size: 13px; }

    /* ── 섹션 ── */
    .section { margin-bottom: 20px; }
    .section-title {
      background: #1f3864;
      color: #fff;
      font-size: 12.5px;
      font-weight: 700;
      padding: 6px 12px;
      letter-spacing: 0.3px;
    }

    /* ── 공통 테이블 ── */
    .tbl {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #bbb;
      font-size: 12.5px;
    }
    .tbl th {
      padding: 7px 11px;
      background: #f0f0f0;
      font-weight: 600;
      color: #333;
      border: 1px solid #bbb;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }
    .tbl td {
      padding: 7px 11px;
      border: 1px solid #bbb;
      color: #1a1a1a;
      vertical-align: top;
      line-height: 1.65;
    }
    .tbl thead th {
      background: #f0f0f0;
      font-size: 12px;
      text-align: center;
    }
    .tbl tbody tr:nth-child(even) td { background: #fafafa; }

    /* ── Before / After ── */
    .tbl .td-item { background: #f5f5f5; font-weight: 600; color: #333; width: 155px; }
    .tbl th.th-before { color: #a00; }
    .tbl th.th-after  { color: #197340; }
    .tbl .td-before { color: #a00; }
    .tbl .td-after  { color: #197340; font-weight: 600; }

    /* ── 위험도 ── */
    .r-hi  { font-weight: 700; color: #c00; }
    .r-mid { font-weight: 700; }
    .r-low { color: #888; }

    /* ── 작업 절차 ── */
    .td-step { text-align: center; font-weight: 700; color: #1f3864; }
    .td-exec { text-align: center; font-size: 12px; }

    /* ── 좌측 라벨 th ── */
    .th-label {
      width: 110px;
      background: #f5f5f5;
      font-size: 11.5px;
      color: #555;
    }

    /* ── code ── */
    code {
      font-family: 'SFMono-Regular', 'Consolas', 'Menlo', monospace;
      font-size: 11.5px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 0 4px;
      border-radius: 2px;
    }

    /* ── 비고 ── */
    .note {
      font-size: 11.5px;
      color: #666;
      margin-top: 6px;
      line-height: 1.65;
    }

    /* ── 문서 푸터 ── */
    .doc-footer {
      margin-top: 28px;
      padding-top: 8px;
      border-top: 1px solid #bbb;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
<div class="doc">

  <!-- ── 헤더 ── -->
  <div class="doc-header">
    <div class="doc-header-top">
      <img src="logo.png" alt="">
      <div class="doc-header-meta">
        문서번호: —<br>
        작성일: —
      </div>
    </div>
    <div class="doc-header-title">작업계획서</div>
  </div>

  <!-- ── 문서 기본 정보 ── -->
  <table class="tbl-info">
    <tr>
      <th>작업명</th>
      <td colspan="3" class="td-main">—</td>
    </tr>
    <tr>
      <th>작업 이유</th>
      <td colspan="3">—</td>
    </tr>
    <tr>
      <th>근거 문서</th>
      <td>—</td>
      <th>우선순위</th>
      <td>—</td>
    </tr>
    <tr>
      <th>대상 리소스</th>
      <td>—</td>
      <th>AWS 계정</th>
      <td>—</td>
    </tr>
    <tr>
      <th>작업 예정일</th>
      <td>—</td>
      <th>담당자</th>
      <td>—</td>
    </tr>
    <tr>
      <th>작성자</th>
      <td colspan="3">—</td>
    </tr>
  </table>

  <!-- ── 1. 변경 Before / After ── -->
  <div class="section">
    <div class="section-title">1. 변경 Before / After</div>
    <table class="tbl">
      <thead>
        <tr>
          <th style="width:155px; text-align:left;">항목</th>
          <th class="th-before" style="width:40%">Before (현재 상태)</th>
          <th class="th-after">After (적용 후)</th>
        </tr>
      </thead>
      <tbody>
        <tr><td class="td-item">—</td><td class="td-before">—</td><td class="td-after">—</td></tr>
        <tr><td class="td-item">—</td><td class="td-before">—</td><td class="td-after">—</td></tr>
        <tr><td class="td-item">—</td><td class="td-before">—</td><td class="td-after">—</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── 2. 위험도 분석 ── -->
  <div class="section">
    <div class="section-title">2. 위험도 분석</div>
    <table class="tbl">
      <thead>
        <tr>
          <th style="width:185px">위험 항목</th>
          <th style="width:55px">수준</th>
          <th>분석</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>—</td><td style="text-align:center">—</td><td>—</td></tr>
        <tr><td>—</td><td style="text-align:center">—</td><td>—</td></tr>
        <tr><td>—</td><td style="text-align:center">—</td><td>—</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── 3. 롤백 계획 ── -->
  <div class="section">
    <div class="section-title">3. 롤백 계획</div>
    <table class="tbl">
      <tr>
        <th class="th-label">롤백 트리거</th>
        <td>—</td>
      </tr>
      <tr>
        <th class="th-label">롤백 방법</th>
        <td>—</td>
      </tr>
      <tr>
        <th class="th-label">예상 시간</th>
        <td>—</td>
      </tr>
      <tr>
        <th class="th-label">담당자</th>
        <td>—</td>
      </tr>
    </table>
  </div>

  <!-- ── 4. 작업 절차 ── -->
  <div class="section">
    <div class="section-title">4. 작업 절차</div>
    <table class="tbl">
      <thead>
        <tr>
          <th style="width:44px">단계</th>
          <th style="width:115px; text-align:left;">작업</th>
          <th style="text-align:left;">내용</th>
          <th style="width:78px">실행</th>
          <th style="width:58px">담당</th>
        </tr>
      </thead>
      <tbody>
        <tr><td class="td-step">①</td><td>—</td><td>—</td><td class="td-exec">—</td><td class="td-exec">—</td></tr>
        <tr><td class="td-step">②</td><td>—</td><td>—</td><td class="td-exec">—</td><td class="td-exec">—</td></tr>
        <tr><td class="td-step">③</td><td>—</td><td>—</td><td class="td-exec">—</td><td class="td-exec">—</td></tr>
        <tr><td class="td-step">④</td><td>—</td><td>—</td><td class="td-exec">—</td><td class="td-exec">—</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── 문서 푸터 ── -->
  <div class="doc-footer">
    <span>—</span>
    <span>—</span>
  </div>

</div>
</body>
</html>
