<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DnDn — Login</title>
<link rel="stylesheet" href="../assets/css/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700;900&display=swap" rel="stylesheet">
<script>
  /* FOUC 방지: CSS 로드 전에 테마 클래스 적용 */
  (function () {
    var t = localStorage.getItem('dndn-theme');
    if (t === 'dark') document.documentElement.classList.add('dark');
  })();
</script>
<style>
  /* ── 라이트 (기본값) ── */
  :root {
    --bg:          #f5f7fa;
    --mint:        #228BE6;
    --white:       #111318;
    --muted:       #9ba3b2;
    --line:        rgba(0, 0, 0, 0.35);
    --btn-text:    #ffffff;
    --placeholder: #9ba3b2;
    --link:        #5a6070;
    --glow:        rgba(34, 139, 230, 0.06);
  }

  /* ── 다크 ── */
  :root.dark {
    --bg:          #0d1620;
    --mint:        #4ADEAA;
    --white:       #e6edf3;
    --muted:       #484f58;
    --line:        rgba(255, 255, 255, 0.5);
    --btn-text:    #0d1620;
    --placeholder: #e6edf3;
    --link:        #e6edf3;
    --glow:        rgba(74, 222, 170, 0.055);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    transition: background 0.25s;
    color: var(--white);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .glow {
    position: fixed;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 700px;
    background: radial-gradient(ellipse, var(--glow) 0%, transparent 60%);
    pointer-events: none;
    transition: background 0.4s;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 0 24px;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-wrap {
    margin-bottom: 80px;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  .logo-wrap object {
    height: 170px;
    width: auto;
    display: block;
    pointer-events: none;
    background: transparent;
  }
  #logo-dark { display: none; }
  :root.dark #logo-light { display: none; }
  :root.dark #logo-dark  { display: block; }

  .form {
    width: 100%;
    position: relative;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s both;
  }

  .field {
    margin-bottom: 40px;
    position: relative;
  }

  .field-input {
    display: block;
    width: 100%;
    height: 44px;
    background: transparent;
    border: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    box-shadow: none;
    padding: 10px 0 12px;
    line-height: 1;
    font-family: 'Pretendard', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--white);
    outline: none;
    caret-color: var(--mint);
    transition: color 0.25s;
  }
  /* Edge 패스워드 눈 아이콘 제거 (레이아웃 영향 방지) */
  input[type="password"]::-ms-reveal,
  input[type="password"]::-ms-clear { display: none; }

  .field-input::placeholder {
    color: var(--placeholder);
    font-weight: 600;
    transition: opacity 0.25s;
  }
  .field-input:focus::placeholder {
    opacity: 0;
  }

  .field::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 1px;
    background: var(--line);
    transition: background 0.25s;
  }
  .field::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--mint);
    transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .field:focus-within::after { width: 100%; }

  .error-msg {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -28px;
    text-align: center;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #eb3737;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.22,1,0.36,1);
    pointer-events: none;
  }
  .error-msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 17px 0;
    background: var(--mint);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    font-family: 'Pretendard', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.88; }
  .btn-login:active { opacity: 0.78; }

  .footer {
    margin-top: 28px;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.18s both;
  }

  .link {
    font-size: 13px;
    font-weight: 600;
    color: var(--link);
    cursor: pointer;
    transition: color 0.2s;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }
  .link:hover { color: var(--white); border-bottom-color: var(--line); }

  .version {
    position: fixed;
    bottom: 28px; right: 32px;
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    opacity: 0.3;
    letter-spacing: 1px;
  }

  /* ── 모드 토글 슬라이더 ── */
  .mode-toggle {
    position: fixed;
    top: 28px; right: 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    z-index: 10;
    background: none;
    border: none;
    padding: 0;
  }
  .toggle-track {
    width: 44px;
    height: 24px;
    background: var(--mint);
    border-radius: 12px;
    position: relative;
    transition: background 0.25s;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #ffffff;
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  /* 다크 모드일 때 썸 오른쪽으로 */
  :root.dark .toggle-thumb { transform: translateX(20px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 비밀번호 재설정 팝업 ── */
  .pw-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .pw-overlay.open { display: flex; }

  .pw-modal {
    background: var(--bg);
    border: 1px solid rgba(128,128,128,0.18);
    border-radius: 16px;
    padding: 32px 28px 24px;
    width: 100%;
    max-width: 380px;
    margin: 0 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18);
    animation: fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .pw-modal-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 8px;
  }
  .pw-modal-desc {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 22px;
  }

  .pw-input-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .pw-input {
    display: block;
    width: 100%;
    padding: 11px 14px;
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 8px;
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .pw-input::placeholder { color: var(--muted); }
  .pw-input:focus { border-color: var(--mint); }

  .pw-modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .pw-btn-cancel {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(128,128,128,0.25);
    background: transparent;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pw-btn-cancel:hover { color: var(--white); border-color: rgba(128,128,128,0.5); }

  .pw-btn-send {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: var(--mint);
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--btn-text);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pw-btn-send:hover { opacity: 0.85; }

  /* 2단계 — 발송 완료 */
  .pw-step { display: none; }
  .pw-step.active { display: block; }

  .pw-sent-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(34,139,230,0.1);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 22px;
  }
  :root.dark .pw-sent-icon { background: rgba(74,222,170,0.1); }

  .pw-sent-email {
    font-weight: 700;
    color: var(--mint);
  }
  .pw-sent-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<button class="mode-toggle" id="modeToggle" onclick="toggleTheme()">
  <div class="toggle-track" id="toggleTrack">
    <div class="toggle-thumb"></div>
  </div>
</button>

<div class="glow"></div>

<div class="container">

  <div class="logo-wrap">
    <object id="logo-light" data="../assets/images/logo-light-animated.svg" type="image/svg+xml"></object>
    <object id="logo-dark"  data="../assets/images/logo-dark-animated.svg"  type="image/svg+xml"></object>
  </div>

  <form class="form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <input class="field-input" id="input-id" type="text" placeholder="아이디" autocomplete="username"/>
    </div>
    <div class="field">
      <input class="field-input" id="input-pw" type="password" placeholder="비밀번호" autocomplete="current-password"/>
      <div class="error-msg" id="errorMsg"></div>
    </div>
    <button class="btn-login" type="submit">LOGIN</button>
  </form>

  <div class="footer">
    <a class="link" onclick="openPwReset()">비밀번호를 잊으셨나요?</a>
  </div>

</div>

<!-- 비밀번호 재설정 팝업 -->
<div class="pw-overlay" id="pwOverlay" onclick="onOverlayClick(event)">
  <div class="pw-modal">

    <!-- 1단계: 이메일 입력 -->
    <div class="pw-step active" id="pwStep1">
      <div class="pw-modal-title">비밀번호 재설정</div>
      <div class="pw-modal-desc">가입 시 사용한 이메일을 입력하면<br>재설정 링크를 보내드립니다.</div>
      <div class="pw-input-wrap">
        <input class="pw-input" id="pwEmail" type="email" placeholder="이메일" autocomplete="email"/>
      </div>
      <div class="pw-modal-footer">
        <button class="pw-btn-cancel" onclick="closePwReset()">취소</button>
        <button class="pw-btn-send" onclick="sendPwReset()">확인</button>
      </div>
    </div>

    <!-- 2단계: 발송 완료 -->
    <div class="pw-step" id="pwStep2">
      <div class="pw-sent-icon">✉</div>
      <div class="pw-modal-title">이메일을 확인해 주세요</div>
      <div class="pw-modal-desc">
        <span class="pw-sent-email" id="pwSentAddr"></span><br>
        으로 재설정 링크를 보냈습니다.
        <div class="pw-sent-note">링크는 30분간 유효합니다.</div>
      </div>
      <div class="pw-modal-footer">
        <button class="pw-btn-send" onclick="closePwReset()">확인</button>
      </div>
    </div>

  </div>
</div>

<div class="version">DnDn v2.0</div>

<script src="../assets/js/theme.js"></script>
<script>
  /* ── 로그인 처리 ── */
  function handleLogin(e) {
    e.preventDefault();
    const id = document.getElementById('input-id').value.trim();
    const pw = document.getElementById('input-pw').value;
    const errEl = document.getElementById('errorMsg');

    // 빈 값 검증
    if (!id) { showError('아이디를 입력해 주세요.'); document.getElementById('input-id').focus(); return; }
    if (!pw) { showError('비밀번호를 입력해 주세요.'); document.getElementById('input-pw').focus(); return; }

    // TODO: Cognito authenticateUser 연동 예정
    // 현재는 mock — 어떤 값이든 로그인 성공 처리
    hideError();
    window.location.href = '대시보드.html';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  /* ── 비밀번호 재설정 ── */
  function openPwReset() {
    document.getElementById('pwStep1').classList.add('active');
    document.getElementById('pwStep2').classList.remove('active');
    document.getElementById('pwEmail').value = '';
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwEmail').focus(), 50);
  }

  function closePwReset() {
    document.getElementById('pwOverlay').classList.remove('open');
  }

  function sendPwReset() {
    const email = document.getElementById('pwEmail').value.trim();
    if (!email) {
      document.getElementById('pwEmail').focus();
      return;
    }
    document.getElementById('pwSentAddr').textContent = email;
    document.getElementById('pwStep1').classList.remove('active');
    document.getElementById('pwStep2').classList.add('active');
  }

  function onOverlayClick(e) {
    if (e.target === document.getElementById('pwOverlay')) closePwReset();
  }
</script>
</body>
</html>
