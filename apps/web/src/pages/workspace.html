<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnDn — 워크스페이스</title>
  <link rel="stylesheet" href="../assets/css/pretendard.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    body { min-height: 100vh; }

    /* ── 메인 영역 ── */
    .main { padding-top: var(--nav-h); min-height: 100vh; }
    .main-inner { padding: 70px 110px; }
    @media (min-width: 1024px) { .main { margin-left: var(--sidebar-w); } }

    /* ── 페이지 헤더 ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-size: 30px; font-weight: 800; color: var(--text); }
    .btn-create { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: 8px; background: var(--mint); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Pretendard', sans-serif; transition: opacity 0.15s; }
    .btn-create:hover { opacity: 0.85; }

    /* ── 워크스페이스 카드 ── */
    .ws-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .ws-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 22px 20px 18px; display: flex; flex-direction: column; justify-content: space-between; min-height: 170px; }
    .ws-card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .ws-icon { width: 42px; height: 42px; border-radius: 8px; background: var(--mint-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--mint); }
    .ws-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .ws-name .ws-acct { font-size: 12.5px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }
    .ws-repo-line { display: flex; align-items: center; gap: 5px; margin-top: 6px; font-size: 12px; color: var(--text-sub); font-weight: 500; }
    .ws-repo-line svg { flex-shrink: 0; color: var(--text-muted); }
    .ws-memo { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    .ws-foot { display: flex; align-items: center; justify-content: flex-end; gap: 4px; border-top: 1px solid var(--border); padding-top: 12px; }
    .btn-icon { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.12s; }
    .btn-icon:hover { background: var(--mint-soft); color: var(--mint); }
    .btn-icon.del:hover { background: var(--red-soft); color: var(--red); }

    /* ── 아이콘 피커 ── */
    .icon-picker { display: flex; gap: 6px; flex-wrap: wrap; }
    .icon-opt { width: 38px; height: 38px; border-radius: 8px; border: 2px solid transparent; background: var(--bg-alt); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.12s; }
    .icon-opt:hover { border-color: var(--border-med); color: var(--text); }
    .icon-opt.selected { border-color: var(--mint); background: var(--mint-soft); color: var(--mint); }

    /* ── 모달 ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); width: 440px; max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal-head { padding: 18px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 4px; transition: all 0.12s; }
    .modal-close:hover { color: var(--red); background: var(--red-soft); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--text-sub); }
    .field-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-med); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; font-family: 'Pretendard', sans-serif; font-weight: 500; outline: none; transition: border-color 0.15s; box-sizing: border-box; }
    .field-input:focus { border-color: var(--mint); }
    .field-input::placeholder { color: var(--text-muted); }
    .modal-foot { padding: 14px 24px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .btn-modal { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Pretendard', sans-serif; border: 1px solid var(--border-med); transition: all 0.15s; }
    .btn-cancel { background: var(--bg); color: var(--text-sub); }
    .btn-cancel:hover { background: var(--bg-alt); }
    .btn-save { background: var(--mint); color: #fff; border-color: var(--mint); }
    .btn-save:hover { opacity: 0.85; }

    /* ── 모달 프로필 ── */
    .modal-profile { display: flex; align-items: center; gap: 16px; }
    .modal-icon-area { position: relative; flex-shrink: 0; }
    .modal-icon-preview { width: 56px; height: 56px; border-radius: 12px; background: var(--mint-soft); display: flex; align-items: center; justify-content: center; color: var(--mint); }
    .modal-icon-preview svg { width: 24px; height: 24px; }
    .modal-icon-btn { position: absolute; bottom: -4px; right: -4px; width: 22px; height: 22px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-med); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.12s; }
    .modal-icon-btn:hover { border-color: var(--mint); color: var(--mint); }
    .modal-icon-picker { display: none; position: absolute; top: 64px; left: 0; z-index: 10; background: var(--bg-card); border: 1px solid var(--border-med); border-radius: 10px; padding: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .modal-icon-picker.open { display: grid; grid-template-columns: repeat(4, 38px); gap: 4px; }
    .modal-icon-picker .icon-opt { width: 38px; height: 38px; }
    .modal-name-area { flex: 1; min-width: 0; }
    .modal-alias-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-med); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 16px; font-weight: 700; font-family: 'Pretendard', sans-serif; outline: none; box-sizing: border-box; transition: border-color 0.15s; }
    .modal-alias-input:focus { border-color: var(--mint); }
    .modal-alias-input::placeholder { color: var(--text-muted); font-weight: 500; }
    .modal-acct-info { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── 모달 연동 요약 ── */
    .modal-conn-summary { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; background: var(--bg-alt); border-radius: 8px; }
    .modal-conn-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-sub); }
    .modal-conn-row svg { flex-shrink: 0; color: var(--text-muted); }
    .modal-conn-row .conn-val { color: var(--text); font-weight: 500; }

    /* ── 삭제 확인 모달 ── */
    .del-modal { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); width: 360px; max-width: 88vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); text-align: center; padding: 28px 24px 20px; }
    .del-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--red-soft); color: var(--red); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .del-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .del-desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px; }
    .del-desc strong { color: var(--text); font-weight: 600; }
    .del-actions { display: flex; gap: 8px; justify-content: center; }
    .btn-del { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-del:hover { opacity: 0.85; }

    /* ── 토스트 알림 ── */
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 12px 22px; border-radius: 10px; font-size: 13.5px; font-weight: 600; font-family: 'Pretendard', sans-serif; z-index: 900; opacity: 0; pointer-events: none; transition: all 0.25s ease; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast.warn { background: #fff3e0; color: #e65100; border: 1px solid #ffcc02; }
    :root.dark .toast.warn { background: #3e2c10; color: #ffb74d; border-color: #6d4c00; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .main-inner { animation: fadeUp 0.3s ease both; }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- 사이드바 -->

    <nav class="sidebar-nav">

    <div class="sidebar-bottom">
      <div class="nav-item" style="gap:10px; cursor:default; pointer-events:none;">
        <img id="sidebar-company-logo" class="sidebar-company-logo" alt="" style="display:none;">

          <div id="sidebar-name" style="font-size:13px;font-weight:600;color:var(--text);"></div>
          <div id="sidebar-role" style="font-size:11.5px;color:var(--text-muted);"></div>
        </div>
        <button class="sidebar-toggle" onclick="toggleTheme()" aria-label="테마 전환">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
      </div>
    </div>
  </aside>

  <!-- 상단 네비 -->
  <header class="topnav">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">
      <svg width="20" height="16" viewBox="0 0 16 13" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0"  width="16" height="3" rx="1" fill="currentColor"/>
        <rect x="0" y="5"  width="16" height="3" rx="1" fill="currentColor"/>
        <rect x="0" y="10" width="16" height="3" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <object id="nav-logo-light" class="nav-logo-obj" data="../assets/images/logo-light-animated.svg" type="image/svg+xml"></object>
    <object id="nav-logo-dark"  class="nav-logo-obj" data="../assets/images/logo-dark-animated.svg"  type="image/svg+xml"></object>

    <!-- 브레드크럼 -->
    <span class="nav-title">홈<span class="sep">&gt;</span><span class="crumb-cur">워크스페이스</span></span>

    <div class="topnav-right">
      <div class="profile-info">
        <span id="profile-name" class="profile-name"></span>
        <span id="profile-role" class="profile-role"></span>
      </div>
      <span id="company-name" class="company-name"></span>
      <div class="divider-v"></div>
      <img id="company-logo" class="company-logo" alt="" style="display:none;">
    </div>
  </header>

  <!-- 메인 컨텐츠 -->
  <main class="main">
    <div class="main-inner">

      <!-- 페이지 헤더 -->
      <div class="page-header">
        <div class="page-title">워크스페이스</div>
        <button class="btn-create" id="btn-create-ws" onclick="goCreate()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          워크스페이스 생성
        </button>
      </div>

      <!-- 워크스페이스 목록 -->
      <div id="ws-list" class="ws-list"></div>

    </div>
  </main>

  <!-- 워크스페이스 편집 모달 -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title">워크스페이스 편집</span>
        <button class="modal-close" onclick="closeModal()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <!-- 프로필: 아이콘 + 별칭 -->
        <div class="modal-profile">
          <div class="modal-icon-area">
            <div class="modal-icon-preview" id="modal-icon-preview"></div>
            <button class="modal-icon-btn" onclick="toggleModalIconPicker()" title="아이콘 변경">
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L5 11H3V9l6.5-6.5z"/></svg>
            </button>
            <div class="modal-icon-picker" id="modal-icon-picker"></div>
          </div>
          <div class="modal-name-area">
            <input class="modal-alias-input" id="f-alias" type="text" placeholder="워크스페이스 별칭">
            <div class="modal-acct-info" id="modal-acct-info"></div>
          </div>
        </div>

        <!-- 메모 -->
        <div class="field-group">
          <label class="field-label">메모</label>
          <textarea class="field-input" id="f-memo" rows="2" placeholder="이 워크스페이스에 대한 설명" style="resize:vertical;"></textarea>
        </div>

        <!-- 연동 정보 (읽기 전용) -->
        <div class="field-group">
          <label class="field-label">연동 정보</label>
          <div class="modal-conn-summary" id="modal-conn-summary"></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-modal btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-modal btn-save" onclick="saveAccount()">저장</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="del-overlay" onclick="if(event.target===this)closeDelModal()">
    <div class="del-modal">
      <div class="del-icon">
        <svg width="22" height="22" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,4 12,4"/><path d="M5 4V3a1 1 0 011-1h2a1 1 0 011 1v1"/><path d="M3 4l1 8a1 1 0 001 1h4a1 1 0 001-1l1-8"/></svg>
      </div>
      <div class="del-title">워크스페이스 삭제</div>
      <div class="del-desc" id="del-desc"></div>
      <div class="del-actions">
        <button class="btn-modal btn-cancel" onclick="closeDelModal()">취소</button>
        <button class="btn-modal btn-del" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/mock/mock.js"></script>
  <script>
    /* ── 세션 정보 ── */
    document.getElementById('profile-name').textContent = session.name;
    document.getElementById('profile-role').textContent  = session.role;
    document.getElementById('company-name').textContent  = session.company.name;
    document.getElementById('sidebar-name').textContent  = session.name;
    document.getElementById('sidebar-role').textContent  = session.role;
    if (session.company.logoUrl) {
      const isDark = document.documentElement.classList.contains('dark');
      const logoSrc = (isDark && session.company.logoDarkUrl) ? session.company.logoDarkUrl : session.company.logoUrl;
      const logo = document.getElementById('company-logo');
      logo.src = logoSrc; logo.style.display = 'block';
      const sidebarLogo = document.getElementById('sidebar-company-logo');
      sidebarLogo.src = logoSrc; sidebarLogo.style.display = 'block';
    }

    /* ── 사이드바 토글 ── */
    let isOpen = false;
    function toggleSidebar() {
      isOpen = !isOpen;
      document.getElementById('sidebar').classList.toggle('open', isOpen);
      document.getElementById('overlay').classList.toggle('visible', isOpen);
    }

    let selectedIcon = ICON_KEYS[0];
    const accounts = wsAccounts;

    /* ── 토스트 ── */
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.className = 'toast warn';
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    /* ── 모달 아이콘 피커 ── */
    function renderModalIconPicker(sel) {
      selectedIcon = sel || ICON_KEYS[0];
      document.getElementById('modal-icon-preview').innerHTML = WS_ICONS[selectedIcon];
      const picker = document.getElementById('modal-icon-picker');
      picker.innerHTML = ICON_KEYS.map(k =>
        `<div class="icon-opt${k === selectedIcon ? ' selected' : ''}" onclick="pickModalIcon('${k}')">${WS_ICONS[k]}</div>`
      ).join('');
    }
    function pickModalIcon(k) {
      selectedIcon = k;
      document.getElementById('modal-icon-preview').innerHTML = WS_ICONS[k];
      document.querySelectorAll('#modal-icon-picker .icon-opt').forEach(el => el.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('modal-icon-picker').classList.remove('open');
    }
    function toggleModalIconPicker() {
      document.getElementById('modal-icon-picker').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      const area = document.querySelector('.modal-icon-area');
      if (area && !area.contains(e.target)) {
        document.getElementById('modal-icon-picker').classList.remove('open');
      }
    });

    function renderAccounts() {
      const list = document.getElementById('ws-list');
      list.innerHTML = accounts.map((a, i) => {
        const repoPath = [a.repo, a.path].filter(Boolean).join('/');
        const icon = WS_ICONS[a.icon] || WS_ICONS[ICON_KEYS[0]];
        const memoHtml = a.memo ? `<div class="ws-memo">${a.memo}</div>` : `<div class="ws-memo" style="opacity:0.4">메모 없음</div>`;
        return `<div class="ws-card">
          <div>
            <div class="ws-card-top">
              <div class="ws-icon">${icon}</div>
              <div class="ws-info">
                <div class="ws-name">${a.alias} <span class="ws-acct">(${a.acctId})</span></div>
                <div class="ws-repo-line">${SVG.github} ${repoPath}</div>
              </div>
            </div>
            ${memoHtml}
          </div>
          <div class="ws-foot">
            <button class="btn-icon" title="편집" onclick="editAccount(${i})">${SVG.edit}</button>
            <button class="btn-icon del" title="삭제" onclick="deleteAccount(${i})">${SVG.del}</button>
          </div>
        </div>`;
      }).join('');
    }

    /* ── 권한 체크 ── */
    function checkLeader() {
      if (session.auth !== 'leader') { showToast('접근 권한이 없습니다.', 'warn'); return false; }
      return true;
    }
    function goCreate() { if (checkLeader()) location.href = 'workspace-create.html'; }

    /* ── 모달 ── */
    let editIdx = -1;

    function editAccount(idx) {
      if (!checkLeader()) return;
      editIdx = idx;
      const a = accounts[editIdx];
      renderModalIconPicker(a.icon);
      document.getElementById('f-alias').value = a.alias;
      document.getElementById('f-memo').value  = a.memo || '';
      document.getElementById('modal-acct-info').textContent = 'AWS ' + a.acctId;

      const repoPath = [a.repo, a.path].filter(Boolean).join('/');
      document.getElementById('modal-conn-summary').innerHTML = `
        <div class="modal-conn-row">${SVG.aws}<span>AWS 계정</span><span class="conn-val">${a.acctId}</span></div>
        <div class="modal-conn-row">${SVG.github}<span>저장소</span><span class="conn-val">${a.githubOrg}/${repoPath}</span></div>
        <div class="modal-conn-row">${SVG.github}<span>브랜치</span><span class="conn-val">${a.branch}</span></div>
      `;
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.getElementById('modal-icon-picker').classList.remove('open');
      editIdx = -1;
    }
    let delIdx = -1;
    function deleteAccount(idx) {
      if (!checkLeader()) return;
      delIdx = idx;
      document.getElementById('del-desc').innerHTML = `<strong>${accounts[idx].alias}</strong> 워크스페이스를 삭제하시겠습니까?<br>연동 설정이 함께 삭제되며 복구할 수 없습니다.`;
      document.getElementById('del-overlay').classList.add('open');
    }
    function closeDelModal() {
      document.getElementById('del-overlay').classList.remove('open');
      delIdx = -1;
    }
    function confirmDelete() {
      if (delIdx < 0) return;
      accounts.splice(delIdx, 1);
      renderAccounts();
      closeDelModal();
    }
    function saveAccount() {
      const alias = document.getElementById('f-alias').value.trim();
      if (!alias) { showToast('별칭을 입력하세요.'); return; }
      accounts[editIdx].alias = alias;
      accounts[editIdx].memo  = document.getElementById('f-memo').value.trim();
      accounts[editIdx].icon  = selectedIcon;
      renderAccounts();
      closeModal();
    }

    /* ── 초기 렌더링 ── */
    renderAccounts();
  </script>
</body>
</html>
