<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnDn — 대시보드</title>
  <link rel="stylesheet" href="../assets/css/pretendard.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    body { min-height: 100vh; }

    /* ── 메인 영역 ── */
    .main { padding-top: var(--nav-h); min-height: 100vh; }
    .main-inner { padding: 28px 32px; min-width: 960px; }
    @media (min-width: 1024px) { .main { margin-left: var(--sidebar-w); } }


    /* ── 상단 행: 공지사항 · 오늘업무 2열 ── */
    .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; align-items: stretch; }

    /* ── 공용 섹션 카드 ── */
    .table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; box-shadow: none; overflow: hidden; }
    .table-card-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-card-title { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .count-pill { background: var(--mint-soft); color: var(--mint); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .table-link { font-size: 12px; font-weight: 600; color: var(--mint); text-decoration: none; cursor: pointer; }
    .table-link:hover { text-decoration: underline; }

    /* ── 하단: 테이블 상하 배치 ── */
    .table-stack { display: flex; flex-direction: column; gap: 16px; }

    .doc-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .doc-table thead th {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-align: center; padding: 10px 20px;
      border-bottom: 1px solid var(--border); background: transparent;
      white-space: nowrap;
    }
    .doc-table tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .doc-table tbody tr:last-child { border-bottom: none; }
    .doc-table tbody tr:hover { background: var(--mint-soft); }
    .doc-table tbody td { padding: 0 20px; height: 50px; font-size: 12.5px; font-weight: 600; color: var(--text); vertical-align: middle; text-align: center; }
    .doc-table tbody tr.doc-read td { font-weight: 400; }
    .doc-table tbody tr.doc-read .doc-title { font-weight: 400; }

    .doc-title { font-weight: 600; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .doc-title-row { display: flex; align-items: center; justify-content: center; gap: 6px; overflow: hidden; }
    .doc-title-row .doc-title { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1; }
    .doc-title-row .badge { flex-shrink: 0; font-size: 10px; padding: 2px 6px; }
    .td-author { font-size: 12px; color: var(--text-sub); white-space: nowrap; }
    .td-type { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; }
    .td-date { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; text-align: center; }

    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
    .badge-waiting  { background: var(--orange-soft); color: var(--orange); }
    .badge-done     { background: var(--green-soft);  color: var(--green);  }
    .badge-rejected { background: var(--red-soft);    color: var(--red);    }
    .badge-notice   { background: var(--mint-soft);   color: var(--mint);   }
    .badge-update   { background: var(--purple-soft); color: var(--purple); }
    .doc-table .col-badge { text-align: center; }
    .doc-table .td-author { text-align: center; padding: 0 10px; }
    .tag-notice { color: var(--text); font-weight: 700; font-size: 12px; white-space: nowrap; }
    .tag-update { color: var(--text); font-weight: 700; font-size: 12px; white-space: nowrap; }
    .right-col { display: contents; }
    .card-with-btn { display: flex; flex-direction: column; height: 100%; }
    .card-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    .task-col { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .task-list { list-style: none; padding: 0; margin: 0; flex: 1; display: flex; flex-direction: column; }
    .task-list li { display: flex; align-items: center; gap: 9px; padding: 11px 16px; font-size: 12.5px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.12s; }
    .task-list li:hover { background: var(--mint-soft); }
    .task-list li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text); flex-shrink: 0; }
    .task-list li span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; font-weight: 600; }
    .task-actions { display: flex; align-items: center; gap: 1px; opacity: 0; flex-shrink: 0; transition: opacity 0.15s; }
    .task-list li:hover .task-actions { opacity: 1; }
    .task-action-btn { width: 22px; height: 22px; border: none; background: transparent; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.12s; padding: 0; flex-shrink: 0; }
    .task-action-btn.t-done:hover  { color: var(--green);  background: var(--green-soft); }
    .task-action-btn.t-edit:hover  { color: var(--mint);   background: var(--mint-soft); }
    .task-action-btn.t-del:hover   { color: var(--red);    background: var(--red-soft); }
    .cal-col { width: 196px; flex-shrink: 0; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
    .cal-btn-wrap { padding: 10px 12px; flex-shrink: 0; border-top: 1px solid var(--border); }
    .add-task-btn { width: 20px; height: 20px; border-radius: 50%; background: var(--mint); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; transition: opacity 0.15s; }
    .add-task-btn:hover { opacity: 0.8; }
    .td-num { text-align: center; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; padding: 0 20px !important; white-space: nowrap; }
    .doc-table thead .td-num { padding: 10px 20px !important; }
    .btn-write { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 10px 16px; border-radius: 8px; border: 1.5px solid var(--mint-border); background: var(--mint-soft); color: var(--mint); font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; font-family: 'Pretendard', sans-serif; transition: all 0.15s; }
    .btn-write:hover { background: var(--mint); color: #fff; border-color: var(--mint); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .top-row    { animation: fadeUp 0.3s ease both; }
    .table-stack { animation: fadeUp 0.3s 0.08s ease both; }

    /* ── 문서 현황 패널 (가로형) ── */
    .task-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .doc-stat-row { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .doc-stat-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 9px 6px; gap: 3px;
      cursor: pointer; transition: background 0.12s;
    }
    .doc-stat-item:not(:last-child) { border-right: 1px solid var(--border); }
    .doc-stat-item:hover { background: var(--mint-soft); }
    .doc-stat-lbl { font-size: 12px; font-weight: 600; color: var(--text-sub); text-align: center; line-height: 1.2; }
    .doc-stat-num { font-size: 22px; font-weight: 800; line-height: 1.1; }
    .doc-stat-num.orange { color: var(--orange); }
    .doc-stat-num.mint   { color: var(--mint); }
    .doc-stat-num.green  { color: var(--green); }

    /* ── 미니 캘린더 ── */
    .mini-cal { flex: 1; display: flex; flex-direction: column; padding: 12px 10px 8px; min-height: 0; }
    .mini-cal-head { margin-bottom: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .mini-cal-month { font-size: 12px; font-weight: 800; color: var(--text); }
    .cal-nav { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; line-height: 1; padding: 2px 3px; border-radius: 4px; transition: all 0.12s; }
    .cal-nav:hover { color: var(--mint); background: var(--mint-soft); }
    .mini-cal-grid { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #cal-grid { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .cal-week-hd { display: grid; grid-template-columns: repeat(7, 1fr); flex-shrink: 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 2px; }
    .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; }
    .cal-week:not(:last-child) { border-bottom: 1px solid var(--border); }
    .cal-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; }
    .cal-label.sun { color: #e03131; }
    :root.dark .cal-label.sun { color: #f03e3e; }
    .cal-label.sat { color: var(--mint); }
    .cal-day {
      font-size: 12px; font-weight: 400; color: var(--text);
      border-radius: 50%; cursor: pointer; position: relative;
      transition: background 0.12s;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-day:hover:not(.empty):not(.today) { background: var(--bg-alt); }
    .cal-day.sun-day { color: #e03131; font-weight: 500; }
    :root.dark .cal-day.sun-day { color: #f03e3e; }
    .cal-day.sat-day { color: var(--mint); font-weight: 500; }
    .cal-day.today { background: transparent; color: #fff; font-weight: 800; border-radius: 0; isolation: isolate; }
    .cal-day.today::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border-radius: 50%; background: var(--mint); z-index: -1; }
    :root.dark .cal-day.today { color: #0d1620; }
    .cal-day.empty { cursor: default; pointer-events: none; }
  </style>
</head>
<body>

  <!-- 오버레이: 사이드바 열릴 때 메인 위를 덮음 (네비 아래만) -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- 사이드바: 네비 아래에서 시작, 메인 위에 float -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <span class="nav-section-label">메뉴</span>
      <a class="nav-item active" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="2" y="2" width="7" height="7" rx="1.5"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5"/>
        </svg>
        홈
      </a>
      <a class="nav-item" href="plan.html">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 3H5a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V8l-4-5z"/>
          <path d="M12 3v5h5"/>
        </svg>
        작업계획서 작성
      </a>
      <div class="nav-group">
        <a class="nav-item" href="documents.html">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M5 3h10a1 1 0 011 1v13l-3-2-3 2-3-2-3 2V4a1 1 0 011-1z"/>
          </svg>
          문서 보관함
        </a>
        <div class="nav-sub">
          <a class="nav-sub-item" href="documents.html">처리할 문서</a>
          <a class="nav-sub-item" href="documents.html">전체 문서</a>
        </div>
      </div>
      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="10" cy="10" r="7"/>
          <path d="M10 6v4l2.5 2.5"/>
        </svg>
        보고서 설정
      </a>
      <span class="nav-section-label" style="margin-top:8px;">계정</span>
      <a class="nav-item" href="workspace.html">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 10h14M10 3c-3 3-3 11 0 14M10 3c3 3 3 11 0 14"/>
          <circle cx="10" cy="10" r="7"/>
        </svg>
        워크스페이스
      </a>
      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="10" cy="7" r="3"/>
          <path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
        </svg>
        마이페이지
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="nav-item" style="gap:10px; cursor:default; pointer-events:none;">
        <img id="sidebar-company-logo" class="sidebar-company-logo" alt="" style="display:none;">
        <div>
          <div id="sidebar-name" style="font-size:13px;font-weight:600;color:var(--text);"></div>
          <div id="sidebar-role" style="font-size:11.5px;color:var(--text-muted);"></div>
        </div>
        <button class="sidebar-toggle" onclick="toggleTheme()" aria-label="테마 전환">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
      </div>
    </div>
  </aside>

  <!-- 상단 네비: z-index 최상위, 사이드바가 침범 불가 -->
  <header class="topnav">
    <!-- 햄버거 버튼 -->
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">
      <svg width="20" height="16" viewBox="0 0 16 13" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0"  width="16" height="3" rx="1" fill="currentColor"/>
        <rect x="0" y="5"  width="16" height="3" rx="1" fill="currentColor"/>
        <rect x="0" y="10" width="16" height="3" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <!-- DnDn 로고 -->
    <object id="nav-logo-light" class="nav-logo-obj" data="../assets/images/logo-light-animated.svg" type="image/svg+xml"></object>
    <object id="nav-logo-dark"  class="nav-logo-obj" data="../assets/images/logo-dark-animated.svg"  type="image/svg+xml"></object>

    <!-- 홈에서는 브레드크럼 없음 -->

    <!-- 우측: 알림 | 이름 + 직급, 회사명 | 로고 -->
    <div class="topnav-right">
      <div class="profile-info">
        <span id="profile-name" class="profile-name"></span>
        <span id="profile-role" class="profile-role"></span>
      </div>
      <span id="company-name" class="company-name"></span>
      <div class="divider-v"></div>
      <img id="company-logo" class="company-logo" alt="" style="display:none;">
    </div>
  </header>

  <!-- 메인: 항상 full width -->
  <main class="main">
    <div class="main-inner">

      <!-- 상단 행: 현황 + 게시판 -->
      <div class="top-row">

        <!-- 게시판 -->
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title">공지사항</div>
            <a class="table-link" href="#">전체 보기 →</a>
          </div>
          <table id="notice-table" class="doc-table">
            <colgroup>
              <col style="width:11%">
              <col style="width:14%">
              <col>
              <col style="width:17%">
              <col style="width:22%">
            </colgroup>
            <thead>
              <tr>
                <th class="td-num">번호</th>
                <th class="col-badge">구분</th>
                <th>제목</th>
                <th>작성자</th>
                <th>등록일</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- 우측 컬럼: 오늘 예정된 업무 + 현황 -->
        <div class="right-col">

          <!-- 오늘 예정된 업무 -->
          <div class="table-card card-with-btn">
            <div class="table-card-header">
              <div class="table-card-title">오늘의 업무 <span id="task-count" class="count-pill">0</span></div>
              <button class="add-task-btn" title="업무 추가">
                <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
              </button>
            </div>
            <div class="card-body">
              <div class="task-area">
                <div class="doc-stat-row">
                  <div class="doc-stat-item">
                    <span class="doc-stat-lbl">처리할 문서</span>
                    <span id="stat-pending" class="doc-stat-num orange">0</span>
                  </div>
                  <div class="doc-stat-item">
                    <span class="doc-stat-lbl">진행 중인 문서</span>
                    <span id="stat-ongoing" class="doc-stat-num mint">0</span>
                  </div>
                  <div class="doc-stat-item">
                    <span class="doc-stat-lbl">새로운 문서</span>
                    <span id="stat-new" class="doc-stat-num green">0</span>
                  </div>
                </div>
              <div class="task-col">
                <ul id="task-list" class="task-list"></ul>
              </div><!-- /.task-col -->
              </div><!-- /.task-area -->
              <div class="cal-col">
                <div class="mini-cal">
                  <div class="mini-cal-head">
                    <button class="cal-nav">&#8249;</button>
                    <span id="cal-month" class="mini-cal-month"></span>
                    <button class="cal-nav">&#8250;</button>
                  </div>
                  <div class="mini-cal-grid">
                    <div class="cal-week-hd">
                      <span class="cal-label sun">일</span><span class="cal-label">월</span><span class="cal-label">화</span><span class="cal-label">수</span><span class="cal-label">목</span><span class="cal-label">금</span><span class="cal-label sat">토</span>
                    </div>
                    <div id="cal-grid"></div>
                  </div>
                </div>
                <div class="cal-btn-wrap">
                  <a class="btn-write" href="plan.html">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                      <path d="M8 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V8"/><path d="M14 2l-6 6"/><path d="M10 2h4v4"/>
                    </svg>
                    작업 계획서 작성
                  </a>
                </div>
              </div><!-- /.cal-col -->
            </div>
          </div>


        </div>

      </div>

      <!-- 하단: 테이블 상하 배치 -->
      <div class="table-stack">

        <!-- 내 결재 대기 -->
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title">
              처리할 문서
              <span id="pending-count" class="count-pill">0</span>
            </div>
            <a class="table-link" href="#">전체 보기 →</a>
          </div>
          <table id="pending-table" class="doc-table">
            <colgroup>
              <col style="width:20%">
              <col>
              <col style="width:13%">
              <col style="width:15%">
              <col style="width:14%">
            </colgroup>
            <thead>
              <tr>
                <th class="td-num">문서 번호</th>
                <th>제목</th>
                <th>유형</th>
                <th>작성자</th>
                <th>등록일</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- 완료된 문서 -->
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title">
              완료된 문서
              <span id="completed-count" class="count-pill">0</span>
            </div>
            <a class="table-link" href="#">전체 보기 →</a>
          </div>
          <table id="completed-table" class="doc-table">
            <colgroup>
              <col style="width:20%">
              <col>
              <col style="width:13%">
              <col style="width:15%">
              <col style="width:14%">
            </colgroup>
            <thead>
              <tr>
                <th class="td-num">문서 번호</th>
                <th>제목</th>
                <th>유형</th>
                <th>작성자</th>
                <th>등록일</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

      </div>


    </div>
  </main>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/mock/mock.js"></script>
  <script>
    /* ── 세션 정보 ── */
    document.getElementById('profile-name').textContent = session.name;
    document.getElementById('profile-role').textContent  = session.role;
    document.getElementById('company-name').textContent  = session.company.name;
    document.getElementById('sidebar-name').textContent  = session.name;
    document.getElementById('sidebar-role').textContent  = session.role;
    if (session.company.logoUrl) {
      const isDark = document.documentElement.classList.contains('dark');
      const logoSrc = (isDark && session.company.logoDarkUrl) ? session.company.logoDarkUrl : session.company.logoUrl;
      const logo = document.getElementById('company-logo');
      logo.src = logoSrc; logo.style.display = 'block';
      const sidebarLogo = document.getElementById('sidebar-company-logo');
      sidebarLogo.src = logoSrc; sidebarLogo.style.display = 'block';
    }

    /* ── 사이드바 토글 ── */
    let isOpen = false;
    function toggleSidebar() {
      isOpen = !isOpen;
      document.getElementById('sidebar').classList.toggle('open', isOpen);
      document.getElementById('overlay').classList.toggle('visible', isOpen);
    }

    /* ── 공지사항 렌더링 ── */
    function renderNotices() {
      const typeMap = { notice: '공지', update: '업데이트' };
      document.querySelector('#notice-table tbody').innerHTML =
        dashboardData.notices.slice(0, 5).map(n => `
          <tr onclick="this.classList.add('doc-read')">
            <td class="td-num">${n.id}</td>
            <td class="col-badge"><span class="${n.type === 'notice' ? 'tag-notice' : 'tag-update'}">${typeMap[n.type]}</span></td>
            <td><div class="doc-title">${n.title}</div></td>
            <td class="td-author">${n.author}</td>
            <td class="td-date">${n.date}</td>
          </tr>`).join('');
    }

    /* ── 처리할 문서 렌더링 (max 5) ── */
    const statusMap = {
      waiting:  { cls: 'badge-waiting',  label: '결재 대기' },
      rejected: { cls: 'badge-rejected', label: '반려' },
      done:     { cls: 'badge-done',     label: '완료' }
    };
    function renderPendingDocs() {
      const typeDocMap = { '이벤트': 5, '계획서': 1, '주간': 4 };
      const items = dashboardData.pendingDocs.slice(0, 5);
      document.querySelector('#pending-table tbody').innerHTML =
        items.map(d => {
          const s = statusMap[d.status];
          const docId = typeDocMap[d.type] || 1;
          return `<tr style="cursor:pointer" onclick="window.location.href='viewer.html?id=${docId}'">
            <td class="td-num">${d.docNum}</td>
            <td><div class="doc-title-row"><div class="doc-title">${d.title}</div><span class="badge ${s.cls}">${s.label}</span></div></td>
            <td class="td-type">${d.type}</td>
            <td class="td-author">${d.author}</td>
            <td class="td-date">${d.date}</td>
          </tr>`;
        }).join('');
      document.getElementById('pending-count').textContent = dashboardData.pendingDocs.length;
    }

    /* ── 완료된 문서 렌더링 (max 5) ── */
    function renderCompletedDocs() {
      const typeDocMap = { '이벤트': 5, '계획서': 9, '주간': 4 };
      const items = dashboardData.completedDocs.slice(0, 5);
      document.querySelector('#completed-table tbody').innerHTML =
        items.map(d => {
          const docId = typeDocMap[d.type] || 9;
          return `<tr style="cursor:pointer" onclick="window.location.href='viewer.html?id=${docId}'">
            <td class="td-num">${d.docNum}</td>
            <td><div class="doc-title">${d.title}</div></td>
            <td class="td-type">${d.type}</td>
            <td class="td-author">${d.author}</td>
            <td class="td-date">${d.date}</td>
          </tr>`;
        }).join('');
      document.getElementById('completed-count').textContent = dashboardData.completedDocs.length;
    }

    /* ── 오늘의 업무 렌더링 ── */
    const _svgDone = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 6,11 12,3"/></svg>`;
    const _svgEdit = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L5 11H3V9l6.5-6.5z"/></svg>`;
    const _svgDel  = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 12,4"/><path d="M5 4V3a1 1 0 011-1h2a1 1 0 011 1v1"/><path d="M3 4l1 8a1 1 0 001 1h4a1 1 0 001-1l1-8"/></svg>`;
    function renderTasks() {
      document.getElementById('task-list').innerHTML =
        dashboardData.tasks.map(t => `
          <li>
            <span>${t}</span>
            <div class="task-actions">
              <button class="task-action-btn t-done" title="완료">${_svgDone}</button>
              <button class="task-action-btn t-edit" title="수정">${_svgEdit}</button>
              <button class="task-action-btn t-del"  title="삭제">${_svgDel}</button>
            </div>
          </li>`).join('');
      document.getElementById('task-count').textContent = dashboardData.tasks.length;
    }

    /* ── 문서 현황 수치 ── */
    function renderDocStats() {
      document.getElementById('stat-pending').textContent = dashboardData.docStats.pending;
      document.getElementById('stat-ongoing').textContent = dashboardData.docStats.ongoing;
      document.getElementById('stat-new').textContent     = dashboardData.docStats.newDoc;
    }

    /* ── 미니 캘린더 렌더링 ── */
    function renderCalendar() {
      const today   = new Date();
      const year    = today.getFullYear();
      const month   = today.getMonth();
      document.getElementById('cal-month').textContent = `${year}년 ${month + 1}월`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= lastDate; d++) cells.push(d);

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      for (let i = 0; i < cells.length; i += 7) {
        const week = cells.slice(i, i + 7);
        while (week.length < 7) week.push(null);
        const weekEl = document.createElement('div');
        weekEl.className = 'cal-week';
        week.forEach((d, idx) => {
          const span = document.createElement('span');
          if (d === null) {
            span.className = 'cal-day empty';
          } else {
            const cls = ['cal-day'];
            if (idx === 0) cls.push('sun-day');
            if (idx === 6) cls.push('sat-day');
            if (d === today.getDate()) cls.push('today');
            span.className = cls.join(' ');
            span.textContent = d;
          }
          weekEl.appendChild(span);
        });
        grid.appendChild(weekEl);
      }
    }

    /* ── 초기 렌더링 ── */
    renderNotices();
    renderPendingDocs();
    renderCompletedDocs();
    renderTasks();
    renderDocStats();
    renderCalendar();
  </script>
</body>
</html>
