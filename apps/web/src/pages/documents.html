<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnDn — 문서 보관함</title>
  <link rel="stylesheet" href="../assets/css/pretendard.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    body{height:100vh;display:flex;flex-direction:column;overflow-x:auto;overflow-y:hidden;}

    /* ── 페이지 바디 ── */
    .page-body{margin-top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow:hidden;display:flex;flex-direction:column;min-width:960px;}
    @media (min-width: 1024px) { .page-body { margin-left: var(--sidebar-w); } }

    /* ── 탭 바 ── */
    .tab-bar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:flex-end;gap:0;flex-shrink:0;}
    .tab{padding:14px 18px 12px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;transition:color .15s,border-color .15s;user-select:none;white-space:nowrap;}
    .tab:hover{color:var(--text-sub);}
    .tab.active{color:var(--mint);border-bottom-color:var(--mint);}
    .tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:10px;font-weight:800;}
    .tab.active .tab-count{background:var(--mint);color:#fff;}
    .tab:not(.active) .tab-count{background:rgba(0,0,0,0.07);color:var(--text-muted);}

    /* ── 컨트롤 바 ── */
    .control-bar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .ctrl-sep{width:1px;height:20px;background:var(--border-med);flex-shrink:0;margin:0 4px;}
    /* 검색 (필드 선택 + 입력 통합) */
    .search-wrap{display:flex;align-items:center;border:1px solid var(--border-med);border-radius:8px;background:var(--bg-card);min-width:220px;max-width:380px;transition:border-color .15s;overflow:hidden;}
    .search-wrap:focus-within{border-color:var(--mint-border);}
    .search-field-wrap{position:relative;display:flex;align-items:center;flex-shrink:0;}
    .search-field-select{appearance:none;border:none;border-right:1px solid var(--border-med);background:transparent;padding:8px 22px 8px 12px;font-size:12.5px;font-family:'Pretendard',sans-serif;color:var(--text-sub);font-weight:600;cursor:pointer;outline:none;white-space:nowrap;}
    .search-field-wrap>svg{position:absolute;right:7px;width:10px;height:10px;color:var(--text-muted);pointer-events:none;}
    .search-icon{width:14px;height:14px;color:var(--text-muted);flex-shrink:0;margin:0 7px 0 10px;}
    .search-input{flex:1;border:none;background:transparent;padding:8px 8px 8px 0;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;}
    .search-input::placeholder{color:var(--text-muted);}
    .btn-search{border:1px solid var(--mint-border);border-radius:8px;background:var(--bg-card);padding:7px 16px;font-size:12.5px;font-weight:600;color:var(--mint);cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;font-family:'Pretendard',sans-serif;flex-shrink:0;}
    .btn-search:hover{background:var(--mint);border-color:var(--mint);color:#fff;}

    /* 날짜 피커 */
    .date-picker-wrap{position:relative;display:flex;align-items:center;gap:5px;}
    .date-display-field{display:flex;align-items:center;gap:5px;padding:7px 10px;border:1px solid var(--border-med);border-radius:7px;font-size:12px;font-family:'Pretendard',sans-serif;color:var(--text-muted);background:var(--bg-card);cursor:pointer;white-space:nowrap;width:96px;flex-shrink:0;transition:border-color .15s,color .15s;user-select:none;}
    .date-display-field:hover{border-color:var(--mint-border);}
    .date-display-field.has-value{color:var(--text-sub);}
    .date-display-field.picking{border-color:var(--mint);color:var(--mint);}
    .cal-field-icon{width:12px;height:12px;flex-shrink:0;opacity:.5;}
    .date-display-field:hover .cal-field-icon,.date-display-field.has-value .cal-field-icon,.date-display-field.picking .cal-field-icon{opacity:1;}
    .date-range-sep{font-size:11.5px;color:var(--text-muted);}
    .btn-clear-icon{width:26px;height:26px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);border-radius:6px;padding:0;transition:all .15s;flex-shrink:0;}
    .btn-clear-icon:hover{color:var(--red);background:var(--red-soft);}

    /* 달력 팝업 */
    .cal-popup{position:absolute;top:calc(100% + 8px);left:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.13);padding:14px 12px;z-index:500;width:252px;}
    .cal-popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .cal-nav-btn{width:28px;height:28px;border:1px solid var(--border-med);border-radius:7px;background:transparent;cursor:pointer;font-size:16px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1;}
    .cal-nav-btn:hover{border-color:var(--mint-border);color:var(--mint);}
    .cal-month-label{font-size:13px;font-weight:700;color:var(--text);}
    .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
    .cal-dow-row span{text-align:center;font-size:10.5px;font-weight:600;color:var(--text-muted);padding:3px 0;}
    .cal-popup-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
    .cal-day{height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12.5px;cursor:pointer;color:var(--text);transition:background .1s,color .1s;user-select:none;}
    .cal-day:not(.cal-day-empty):hover{background:var(--mint-soft);color:var(--mint);}
    .cal-day-empty{opacity:0;cursor:default;pointer-events:none;}
    .cal-day-today:not(.cal-day-start):not(.cal-day-end){font-weight:700;color:var(--mint);box-shadow:inset 0 0 0 1.5px var(--mint);}
    .cal-day-start,.cal-day-end{background:var(--mint)!important;color:#fff!important;font-weight:700;}
    .cal-day-range{background:rgba(34,139,230,0.1)!important;color:var(--mint)!important;}

    /* ── 테이블 영역 ── */
    .table-wrap{flex:1;overflow-y:auto;padding:14px 28px;}
    .table-wrap::-webkit-scrollbar{width:4px;}
    .table-wrap::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}

    /* 테이블 */
    .doc-table{width:100%;border-collapse:collapse;table-layout:fixed;}
    .doc-table thead tr{border-bottom:2px solid var(--border-med);}
    .doc-table th{padding:6px 14px;text-align:center;font-size:13px;font-weight:600;color:var(--text-muted);white-space:nowrap;user-select:none;background:var(--bg-sidebar);}
    .doc-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
    .doc-table tbody tr:last-child{border-bottom:none;}
    .doc-table tbody tr:hover{background:var(--mint-soft);}
    .doc-table td{height:44px;padding:0 14px;font-size:12.5px;font-weight:600;color:var(--text);vertical-align:middle;text-align:center;}
    /* 헤더 내 필터 select */
    .th-filter{appearance:none;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text-muted);font-family:'Pretendard',sans-serif;cursor:pointer;outline:none;text-align:center;text-align-last:center;padding:4px 14px 4px 4px;width:auto;}
    .th-filter:focus{color:var(--mint);}
    .th-filter-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:auto;}
    .th-filter-wrap svg{position:absolute;right:0;width:10px;height:10px;color:var(--text-muted);pointer-events:none;}

    /* 체크박스 열 */
    .td-check{width:44px;padding:0 8px;text-align:center;vertical-align:middle;}
    .row-check{width:15px;height:15px;cursor:pointer;accent-color:var(--mint);flex-shrink:0;}
    /* 읽음/안읽음 상태 */
    .doc-table tbody tr.doc-read td{font-weight:400;}
    .doc-table tbody tr.doc-read .doc-title{font-weight:400;}
    /* 읽음 액션 버튼 */
    .btn-read-action{border:1px solid var(--border-med);border-radius:8px;background:var(--bg-card);padding:7px 12px;font-size:12px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Pretendard',sans-serif;flex-shrink:0;}
    .btn-read-action:hover:not(:disabled){border-color:var(--mint-border);color:var(--mint);}
    .btn-read-action:disabled{opacity:.3;cursor:not-allowed;}
    /* 문서명 셀 */
    .doc-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* 공통 셀 */
    .td-docnum{font-size:11.5px;color:var(--text-muted);font-weight:400;white-space:nowrap;letter-spacing:0.3px;}
    .td-author{font-size:12px;color:var(--text-sub);white-space:nowrap;}
    .td-date{font-size:11.5px;color:var(--text-muted);white-space:nowrap;}
    .td-type{font-size:11.5px;color:var(--text-muted);white-space:nowrap;}

    /* 빈 상태 */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;color:var(--text-muted);gap:10px;}
    .empty-state-icon{font-size:40px;opacity:.3;margin-bottom:4px;}
    .empty-state-title{font-size:14px;font-weight:700;color:var(--text-sub);}
    .empty-state-desc{font-size:12.5px;color:var(--text-muted);}

    /* 이 페이지에서는 문서 보관함 하위 메뉴 항상 표시 */
    .nav-group .nav-sub { max-height:100px !important; opacity:1 !important; padding:1px 0 1px 6px; margin:-4px 0 4px 44px; }
    /* 서브메뉴 활성 항목에 파란 박스 */
    .nav-sub-item.active { background: var(--mint-soft); border-radius: 6px; }

    /* 페이지네이션 */
    .pagination{display:flex;align-items:center;justify-content:center;gap:2px;padding:8px 0 12px;}
    .page-btn{min-width:34px;height:34px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .12s;font-family:'Pretendard',sans-serif;padding:0 8px;border-radius:6px;}
    .page-btn:hover:not(:disabled){color:var(--mint);}
    .page-btn.active{font-weight:700;color:var(--mint);}
    .page-btn:disabled{opacity:.3;cursor:not-allowed;}
    .page-btn.page-nav{font-size:16px;}
  </style>
</head>
<body>

<!-- 오버레이 -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- 사이드바 -->
<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav">
    <span class="nav-section-label">메뉴</span>
    <a class="nav-item" href="dashboard.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/>
      </svg>홈
    </a>
    <a class="nav-item" href="plan.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">

      </svg>작업계획서 작성

      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M5 3h10a1 1 0 011 1v13l-3-2-3 2-3-2-3 2V4a1 1 0 011-1z"/>

      </div>
    </div>
    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">

      </svg>보고서 설정
    </a>
    <span class="nav-section-label" style="margin-top:8px;">계정</span>
    <a class="nav-item" href="workspace.html">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M3 10h14M10 3c-3 3-3 11 0 14M10 3c3 3 3 11 0 14"/><circle cx="10" cy="10" r="7"/>
      </svg>워크스페이스
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="7" r="3"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
      </svg>마이페이지
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="nav-item" style="gap:10px; cursor:default; pointer-events:none;">
      <img id="sidebar-company-logo" class="sidebar-company-logo" alt="" style="display:none;">
      <div>
        <div id="sidebar-name" style="font-size:13px;font-weight:600;color:var(--text);"></div>
        <div id="sidebar-role" style="font-size:11.5px;color:var(--text-muted);"></div>
      </div>
      <button class="sidebar-toggle" onclick="toggleTheme()" aria-label="테마 전환">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </div>
</aside>

<!-- 네비 -->
<header class="topnav">
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">
    <svg width="20" height="16" viewBox="0 0 16 13" fill="none">
      <rect x="0" y="0"  width="16" height="3" rx="1" fill="currentColor"/>
      <rect x="0" y="5"  width="16" height="3" rx="1" fill="currentColor"/>
      <rect x="0" y="10" width="16" height="3" rx="1" fill="currentColor"/>
    </svg>
  </button>
  <object id="nav-logo-light" class="nav-logo-obj" data="../assets/images/logo-light-animated.svg" type="image/svg+xml"></object>
  <object id="nav-logo-dark"  class="nav-logo-obj" data="../assets/images/logo-dark-animated.svg"  type="image/svg+xml"></object>
  <span class="nav-title">홈<span class="sep">›</span>문서 보관함<span class="sep">›</span><span class="crumb-cur" id="crumbTab">처리할 문서</span></span>
  <div class="topnav-right">
    <div class="profile-info">
      <span id="profile-name" class="profile-name"></span>
      <span id="profile-role" class="profile-role"></span>
    </div>
    <span id="company-name" class="company-name"></span>
    <div class="divider-v"></div>
    <img id="company-logo" class="company-logo" alt="" style="display:none;">
  </div>
</header>

<div class="page-body">

  <!-- 탭 바 -->
  <div class="tab-bar">
    <div class="tab active" data-tab="action" onclick="switchTab('action')">
      처리할 문서
      <span class="tab-count" id="actionCount">3</span>
    </div>
    <div class="tab" data-tab="all" onclick="switchTab('all')">
      전체 문서
      <span class="tab-count" id="allCount">18</span>
    </div>
  </div>

  <!-- 컨트롤 바 -->
  <div class="control-bar">
    <!-- 검색 (좌측) -->
    <div class="search-wrap">
      <div class="search-field-wrap">
        <select class="search-field-select" id="searchField" onchange="applyFilters()">
          <option value="name">문서명</option>
          <option value="author">작성자</option>
        </select>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
      <input class="search-input" type="text" id="searchInput" oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
    </div>
    <button class="btn-search" type="button" onclick="applyFilters()">검색</button>

    <div class="ctrl-sep"></div>

    <!-- 날짜 피커 -->
    <div class="date-picker-wrap" id="datePickerWrap">
      <span class="date-display-field" id="dateFromDisplay" onclick="toggleCalPicker(event)">
        <svg class="cal-field-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="1.5" y="2.5" width="13" height="12" rx="2"/><path d="M5 1.5v2M11 1.5v2M1.5 6.5h13"/></svg>
        <span id="dateFromText"></span>
      </span>
      <span class="date-range-sep">~</span>
      <span class="date-display-field" id="dateToDisplay" onclick="toggleCalPicker(event)">
        <svg class="cal-field-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="1.5" y="2.5" width="13" height="12" rx="2"/><path d="M5 1.5v2M11 1.5v2M1.5 6.5h13"/></svg>
        <span id="dateToText"></span>
      </span>
      <button class="btn-clear-icon" id="btnDateClear" type="button" onclick="clearDates()" style="visibility:hidden;">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M3 3l10 10M13 3L3 13"/>
        </svg>
      </button>
      <!-- 달력 팝업 -->
      <div class="cal-popup" id="calPopup" style="display:none;">
        <div class="cal-popup-header">
          <button class="cal-nav-btn" type="button" onclick="calPrevMonth()">‹</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-nav-btn" type="button" onclick="calNextMonth()">›</button>
        </div>
        <div class="cal-dow-row">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-popup-grid" id="calPopupGrid"></div>
      </div>
    </div>
    <button class="btn-read-action" id="btnMarkRead" onclick="markRead()" style="margin-left:auto;">읽음</button>
    <button class="btn-read-action" onclick="markAllRead()">전체 읽음</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table class="doc-table" id="docTable">
      <colgroup>
        <col style="width:44px"><!-- 체크 -->
        <col style="width:10%"><!-- 문서번호 -->
        <col><!-- 제목 -->
        <col style="width:12%"><!-- 유형 -->
        <col style="width:9%"><!-- 작성자 -->
        <col style="width:16%"><!-- 등록일 -->
        <col style="width:9%"><!-- 상태 -->
      </colgroup>
      <thead>
        <tr>
          <th class="td-check"><input type="checkbox" class="row-check" id="chkAll" onchange="toggleSelectAll(this.checked)" onclick="event.stopPropagation()"></th>
          <th>문서번호</th>
          <th>제목</th>
          <th>
            <div class="th-filter-wrap">
              <select class="th-filter" id="typeFilter" onchange="applyFilters()">
                <option value="">유형</option>
                <option value="주간보고서">주간 보고서</option>
                <option value="이벤트보고서">이벤트 보고서</option>
                <option value="계획서">작업 계획서</option>
              </select>
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
            </div>
          </th>
          <th>작성자</th>
          <th>등록일</th>
          <th>
            <div class="th-filter-wrap">
              <select class="th-filter" id="statusFilter" onchange="applyFilters()">
                <option value="">상태</option>
                <option value="progress">진행 중</option>
                <option value="done">완료</option>
                <option value="rejected">반려</option>
                <option value="failed">실패</option>
              </select>
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="docTbody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🗂️</div>
      <div class="empty-state-title">해당하는 문서가 없습니다</div>
      <div class="empty-state-desc">검색어나 필터를 조정해보세요</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/mock/mock.js"></script>
<script>
  /* ── 세션 정보 ── */
  document.getElementById('profile-name').textContent = session.name;
  document.getElementById('profile-role').textContent  = session.role;
  document.getElementById('company-name').textContent  = session.company.name;
  document.getElementById('sidebar-name').textContent  = session.name;
  document.getElementById('sidebar-role').textContent  = session.role;
  if (session.company.logoUrl) {
    const isDark = document.documentElement.classList.contains('dark');
    const logoSrc = (isDark && session.company.logoDarkUrl) ? session.company.logoDarkUrl : session.company.logoUrl;
    const logo = document.getElementById('company-logo');
    logo.src = logoSrc; logo.style.display = 'block';
    const sl = document.getElementById('sidebar-company-logo');
    sl.src = logoSrc; sl.style.display = 'block';
  }
  let isOpen = false;
  function toggleSidebar() {
    isOpen = !isOpen;
    document.getElementById('sidebar').classList.toggle('open', isOpen);
    document.getElementById('overlay').classList.toggle('visible', isOpen);
  }
</script>
<script src="../assets/js/문서보관함.js"></script>
</body>
</html>
