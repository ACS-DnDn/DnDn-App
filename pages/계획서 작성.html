<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnDn — 작업계획서 작성</title>
  <link rel="stylesheet" href="../assets/css/pretendard.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    :root {
      --left-w: 280px;
      --right-w: 376px;
    }
    body{height:100vh;overflow:hidden;display:flex;flex-direction:column;}

    /* ── 3패널 ── */
    .workspace{margin-top:var(--nav-h);display:grid;grid-template-columns:var(--left-w) 1fr var(--right-w);height:calc(100vh - var(--nav-h));overflow:hidden;}

    /* ══════════════════════════════
       왼쪽 패널
       결재선: 고정 max-height + 내부 리스트 스크롤
       참조문서: 고정 max-height (더 작게)
       작업내용: flex:1 나머지 공간 전부
    ══════════════════════════════ */
    .panel-left{background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}

    /* 공통 섹션 wrapper */
    .lsec{display:flex;flex-direction:column;border-bottom:1px solid var(--border);padding:13px 14px;}
    .lsec-title{font-size:11.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-shrink:0;}
    .lsec-title svg{width:12px;height:12px;color:var(--mint);flex-shrink:0;}

    /* 결재선 섹션 */
    .lsec-approver{flex-shrink:0;}
    .approver-table-wrap{border:1px solid var(--border-med);border-radius:4px;overflow:hidden;margin-bottom:8px;}
    .approver-table{width:100%;border-collapse:collapse;font-size:11.5px;table-layout:fixed;}
    .approver-table thead tr{display:table;width:100%;table-layout:fixed;}
    .approver-table tbody{display:block;height:130px;overflow-y:auto;}
    .approver-table tbody::-webkit-scrollbar{width:3px;}
    .approver-table tbody::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    .approver-table tbody tr{display:table;width:100%;table-layout:fixed;}
    .approver-table th{background:var(--bg-alt);color:var(--text-sub);font-size:10px;font-weight:700;padding:5px 7px;border-bottom:1px solid var(--border-med);text-align:center;letter-spacing:0.2px;white-space:nowrap;}
    .approver-table td{padding:5px 7px;border-bottom:1px solid var(--border);font-size:11.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
    .approver-table tbody tr:last-child td{border-bottom:none;}
    .approver-table .col-seq{width:26px;}
    .approver-table tbody .col-seq{color:var(--text-muted);font-size:10.5px;}
    .approver-table .col-name{width:56px;}
    .approver-table .col-rank{width:72px;}
    .approver-table .col-type{width:50px;}
    .approver-table .col-del{width:22px;}
    .approver-remove{background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:1px 3px;border-radius:3px;transition:all .12s;line-height:1;}
    .approver-remove:hover{background:var(--red-soft);color:var(--red);}
    .approver-empty td{color:var(--text-muted);font-size:11px;padding:14px 0;border-bottom:none;}
    .approver-table .group-start td{border-top:2px solid var(--border-med);}
    .approver-table .approver-fixed td{background:var(--bg-alt);color:var(--text-sub);}
    .approver-type-sel{padding:4px 8px;border-radius:6px;border:1px solid var(--border-med);font-size:12px;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);outline:none;}

    /* 결재자 추가 팝업 — 2패널 */
    .popup.popup-wide{width:460px;}
    .popup.popup-doc{width:560px;height:480px;}
    .popup-doc .popup-footer{justify-content:flex-end;}
    .apv-popup-body{display:flex;height:300px;border-bottom:1px solid var(--border);padding:10px;gap:8px;}
    .apv-left{width:200px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border-med);border-radius:8px;}
    .apv-left-search{padding:7px 9px;border-bottom:1px solid var(--border-med);flex-shrink:0;display:flex;gap:4px;}
    .apv-left-search input{flex:1;min-width:0;padding:4px 8px;border:1px solid var(--border-med);border-radius:6px;font-size:11.5px;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
    .apv-left-search input:focus{border-color:var(--mint-border);}
    .apv-search-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border-med);background:var(--bg-alt);cursor:pointer;font-size:11px;font-weight:600;color:var(--text-sub);font-family:'Pretendard',sans-serif;transition:all .12s;white-space:nowrap;flex-shrink:0;}
    .apv-search-btn:hover{border-color:var(--mint-border);background:var(--mint-soft);color:var(--mint);}
    .apv-tree{flex:1;overflow-y:auto;}
    .apv-tree::-webkit-scrollbar{width:3px;}
    .apv-tree::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    /* 부서 아코디언 */
    .org-dept-header{display:flex;align-items:center;gap:6px;padding:7px 11px;cursor:pointer;user-select:none;transition:background .1s;}
    .org-dept-header:hover{background:var(--bg-alt);}
    .org-dept-name{font-size:11.5px;font-weight:700;color:var(--text-sub);flex:1;}
    .org-dept-count{font-size:9.5px;color:var(--text-muted);background:var(--bg-alt);padding:1px 5px;border-radius:8px;font-weight:600;}
    .org-dept-chevron{font-size:10px;color:var(--text-muted);transition:transform .15s;line-height:1;}
    .org-dept-header.open .org-dept-chevron{transform:rotate(90deg);}
    .org-dept-body{display:none;}
    .org-dept-body.open{display:block;}
    .org-member{display:flex;align-items:center;gap:7px;padding:5px 11px 5px 20px;cursor:pointer;transition:background .1s;}
    .org-member:hover,.org-member.selected{background:var(--mint-soft);}
    .org-member.disabled{opacity:0.35;pointer-events:none;}
    .org-check{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border-med);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0;transition:all .12s;}
    .org-member.selected .org-check{background:var(--mint);border-color:var(--mint);color:#fff;}
    .org-member.selected .org-check::after{content:'✓';}
    .org-name{font-size:12px;font-weight:600;color:var(--text);}
    .org-rank{font-size:10.5px;color:var(--text-muted);}
    .apv-mid{display:flex;align-items:center;padding:0 4px;flex-shrink:0;}
    .apv-move-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border-med);background:var(--bg);cursor:pointer;font-size:18px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;padding:0;}
    .apv-move-btn:hover{background:var(--mint-soft);border-color:var(--mint-border);color:var(--mint);}
    .apv-right{flex:1;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border-med);border-radius:8px;}
    .apv-right-list{flex:1;overflow-y:auto;padding:4px 0;}
    .apv-right-list::-webkit-scrollbar{width:3px;}
    .apv-right-list::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    .apv-pending-row{display:flex;align-items:center;gap:5px;padding:6px 8px;border-bottom:1px solid var(--border);}
    .apv-pending-row:last-child{border-bottom:none;}
    .apv-pending-name{flex:1;font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .apv-pending-type{font-size:10.5px;border:1px solid var(--border-med);border-radius:4px;padding:2px 3px;background:var(--bg);color:var(--text);outline:none;font-family:'Pretendard',sans-serif;max-width:46px;}
    .apv-pending-del{width:14px;height:14px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:0;border-radius:3px;transition:all .12s;flex-shrink:0;line-height:1;}
    .apv-pending-del:hover{color:var(--red);}

    /* 참조문서 섹션 */
    .lsec-ref{flex-shrink:0;}
    .ref-doc-wrap{border:1px solid var(--border-med);border-radius:4px;overflow:hidden;margin-bottom:8px;height:48px;overflow-y:auto;}
    .ref-doc-wrap::-webkit-scrollbar{width:3px;}
    .ref-doc-wrap::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    .ref-doc-item{display:flex;align-items:center;gap:7px;padding:5px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .ref-doc-item:last-child{border-bottom:none;}
    .ref-doc-icon{font-size:11px;flex-shrink:0;}
    .ref-doc-name{flex:1;font-size:11.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ref-doc-remove{width:14px;height:14px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:0;border-radius:3px;transition:all .12s;flex-shrink:0;line-height:1;}
    .ref-doc-remove:hover{color:var(--red);}

    .btn-add{width:100%;padding:6px 10px;border-radius:7px;border:1px dashed var(--border-med);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;font-family:'Pretendard',sans-serif;flex-shrink:0;}
    .btn-add:hover{border-color:var(--mint-border);color:var(--mint);background:var(--mint-soft);}

    /* 작업 대상 섹션 */
    .lsec-target{flex-shrink:0;}

    /* 작업 내용 섹션: 남은 공간 전부 */
    .lsec-nl{flex:1;border-bottom:none;min-height:0;}
    .nl-target{width:100%;padding:6px 10px;border-radius:7px;border:1px solid var(--border-med);background:var(--bg);color:var(--text);font-size:12.5px;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .15s;flex-shrink:0;}
    .nl-target:focus{border-color:var(--mint-border);background:var(--bg-card);}
    .nl-target::placeholder{color:var(--text-muted);}
    .nl-textarea{flex:1;width:100%;border:1px solid var(--border-med);border-radius:8px;padding:10px 12px;font-size:12.5px;font-family:'Pretendard',sans-serif;color:var(--text);background:var(--bg);resize:none;line-height:1.7;outline:none;transition:border-color .15s;min-height:0;}
    .nl-textarea:focus{border-color:var(--mint-border);background:var(--bg-card);}
    .nl-textarea::placeholder{color:var(--text-muted);}
    .btn-generate{width:100%;margin-top:8px;padding:9px 12px;border-radius:8px;border:none;background:var(--mint);cursor:pointer;font-size:13px;font-weight:700;color:#000;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s;font-family:'Pretendard',sans-serif;flex-shrink:0;}
    .btn-generate:hover{opacity:.85;}

    /* ── 가운데 ── */
    .panel-center{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;border-right:1px solid var(--border);}
    .center-topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
    .doc-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;}
    .doc-status.none{background:rgba(0,0,0,0.05);color:var(--text-muted);}
    .doc-status.draft{background:var(--mint-soft);color:var(--mint);}
    .doc-status.draft::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--mint);}
    .btn-tf{padding:7px 13px;border-radius:8px;border:1px solid rgba(112,72,232,0.2);background:var(--purple-soft);cursor:pointer;font-size:12px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:6px;transition:all .15s;font-family:'Pretendard',sans-serif;}
    .btn-tf:hover:not(:disabled){background:rgba(112,72,232,0.14);}
    .btn-tf:disabled{opacity:.3;cursor:not-allowed;}
    .btn-save{padding:7px 16px;border-radius:8px;border:none;background:var(--mint);cursor:pointer;font-size:12px;font-weight:700;color:#000;display:flex;align-items:center;gap:6px;transition:opacity .15s;font-family:'Pretendard',sans-serif;}
    .btn-save:hover{opacity:.85;}
    .btn-cancel{padding:7px 14px;border-radius:8px;border:1px solid var(--border-med);background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-sub);display:flex;align-items:center;gap:5px;transition:all .15s;font-family:'Pretendard',sans-serif;}
    .btn-cancel:hover{border-color:var(--border);background:var(--bg-alt);color:var(--text);}

    .doc-editor{flex:1;overflow-y:auto;position:relative;}
    .doc-editor.has-doc{padding:0;}
    .doc-editor:not(.has-doc){padding:28px 32px;}
    .doc-editor::-webkit-scrollbar{width:4px;}
    .doc-editor::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}

    /* 빈 상태 — 아무것도 없음 */
    .doc-blank{height:100%;display:flex;align-items:center;justify-content:center;}

    /* 문서 생성 로딩 */
    .doc-loading{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    .loading-shimmer-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px;}
    .shimmer{background:linear-gradient(90deg,#e8eaed 25%,#f3f4f6 50%,#e8eaed 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    .shimmer-title{height:28px;width:75%;}
    .shimmer-meta{height:14px;width:45%;}
    .shimmer-line{height:13px;}
    .shimmer-line.w90{width:90%;}
    .shimmer-line.w80{width:80%;}
    .shimmer-line.w70{width:70%;}
    .shimmer-line.w95{width:95%;}
    .shimmer-block{height:13px;width:100%;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .loading-label{font-size:12px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:7px;}
    .loading-label::before{content:'';width:8px;height:8px;border-radius:50%;border:2px solid var(--mint);border-top-color:transparent;animation:spin .8s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 계획서 콘텐츠 */
    .doc-title-input{width:100%;border:none;outline:none;background:transparent;font-size:21px;font-weight:800;color:var(--text);font-family:'Pretendard',sans-serif;margin-bottom:4px;line-height:1.3;}
    .doc-title-input::placeholder{color:#c8cdd6;}
    .doc-meta-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .doc-meta-item{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
    .doc-meta-item strong{color:var(--text-sub);font-weight:600;}
    .doc-section{margin-bottom:22px;}
    .doc-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
    .doc-section-title::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--mint);flex-shrink:0;}
    .doc-section-wrap{border-radius:8px;padding:3px 6px;margin:0 -6px;}
    .doc-textarea{width:100%;border:1px solid var(--border-med);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);background:var(--bg-alt);resize:vertical;line-height:1.7;outline:none;min-height:72px;transition:border-color .15s;}
    .doc-textarea:focus{border-color:var(--mint-border);background:var(--bg-card);}
    .doc-table{width:100%;border-collapse:collapse;font-size:12.5px;}
    .doc-table th{background:var(--bg-alt);font-weight:700;color:var(--text-sub);padding:7px 11px;text-align:left;border:1px solid var(--border);font-size:11.5px;}
    .doc-table td{padding:7px 11px;border:1px solid var(--border);}
    .doc-table tr:hover td{background:var(--mint-soft);}
    .risk-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;}
    .risk-high{background:var(--red-soft);color:var(--red);}
    .risk-med{background:rgba(247,103,7,0.08);color:var(--orange);}
    .risk-low{background:var(--green-soft);color:var(--green);}

    /* ── 오른쪽: Terraform ── */
    .panel-right{background:#0d1117;display:flex;flex-direction:column;overflow:hidden;}
    .tf-statusbar{height:180px;border-top:1px solid rgba(255,255,255,0.07);background:#0a0f15;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
    .tf-log-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
    .tf-revalidate-btn{width:22px;height:22px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);transition:all .15s;padding:0;flex-shrink:0;}
    .tf-revalidate-btn:hover{border-color:rgba(255,255,255,0.28);color:rgba(255,255,255,0.72);background:rgba(255,255,255,0.06);}
    .tf-revalidate-btn:active{transform:rotate(45deg);}
    .tf-log-panel{flex:1;overflow-y:auto;padding:4px 0;display:none;}
    .tf-log-panel.active{display:block;}
    .tf-log-panel::-webkit-scrollbar{width:3px;}
    .tf-log-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
    .tf-log-entry{display:flex;align-items:flex-start;gap:8px;padding:3px 14px;font-size:11px;line-height:1.5;}
    .tf-log-time{flex-shrink:0;color:rgba(255,255,255,0.2);font-size:10px;font-family:'Courier New',monospace;padding-top:2px;min-width:58px;}
    .tf-log-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .tf-log-msg{flex:1;}
    .tf-log-entry.log-info .tf-log-dot{background:#74c0fc;}
    .tf-log-entry.log-info .tf-log-msg{color:rgba(255,255,255,0.6);}
    .tf-log-entry.log-run .tf-log-dot{background:#fcc419;}
    .tf-log-entry.log-run .tf-log-msg{color:rgba(255,255,255,0.7);}
    .tf-log-entry.log-ok .tf-log-dot{background:#40c057;}
    .tf-log-entry.log-ok .tf-log-msg{color:#40c057;font-weight:600;}
    .tf-log-entry.log-muted .tf-log-dot{background:rgba(255,255,255,0.15);}
    .tf-log-entry.log-muted .tf-log-msg{color:rgba(255,255,255,0.28);}
    .tf-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);}
    .tf-dot{width:6px;height:6px;border-radius:50%;}
    .tf-status.pending .tf-dot{background:rgba(255,255,255,0.2);}
    .tf-status.generating .tf-dot{background:#fcc419;animation:blink .9s infinite;}
    .tf-status.ok .tf-dot{background:#40c057;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

    /* Terraform 빈 상태 — 아무것도 없음 */
    .tf-blank{flex:1;display:flex;align-items:center;justify-content:center;}

    /* Terraform 생성 로딩 */
    .tf-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 20px;}
    .tf-shimmer-wrap{width:100%;display:flex;flex-direction:column;gap:8px;}
    .tf-shimmer{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px;}
    .tf-shimmer.h14{height:14px;}
    .tf-shimmer.h12{height:12px;}
    .tf-shimmer.w60{width:60%;}
    .tf-shimmer.w80{width:80%;}
    .tf-shimmer.w95{width:95%;}
    .tf-shimmer.w70{width:70%;}
    .tf-shimmer.w50{width:50%;}
    .tf-block-mock{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:9px;width:100%;}
    .tf-loading-label{font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.28);display:flex;align-items:center;gap:7px;}
    .tf-loading-label::before{content:'';width:8px;height:8px;border-radius:50%;border:2px solid #74c0fc;border-top-color:transparent;animation:spin .8s linear infinite;flex-shrink:0;}


    /* 코드 에디터 — 탭 뷰 */
    .tf-code-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .tf-tabs-bar{display:flex;align-items:flex-end;gap:1px;padding:8px 12px 0;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
    .tf-tab{padding:6px 12px;border-radius:6px 6px 0 0;border:1px solid transparent;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);font-family:'Pretendard',sans-serif;display:flex;align-items:center;gap:6px;transition:color .12s;position:relative;bottom:-1px;}
    .tf-tab:hover{color:rgba(255,255,255,0.6);}
    .tf-tab.active{color:rgba(255,255,255,0.85);background:#0d1117;border-color:rgba(255,255,255,0.07);border-bottom-color:#0d1117;}
    .tf-code-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
    .tf-code-scroll::-webkit-scrollbar{width:4px;}
    .tf-code-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
    .tf-tab-panel{display:none;flex-direction:column;}
    .tf-tab-panel.active{display:flex;}
    .tf-editor{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:'Courier New',monospace;font-size:11.5px;line-height:1.75;color:#cdd9e5;padding:12px 14px;box-sizing:border-box;display:block;overflow:hidden;}
    .tf-editor:focus{background:rgba(255,255,255,0.025);}

    /* ── 팝업 ── */
    .popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1000;align-items:center;justify-content:center;}
    .popup-overlay.open{display:flex;}
    .popup{background:var(--bg-card);border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.18);width:440px;max-width:92vw;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;animation:popIn .17s ease;}
    @keyframes popIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .popup-header{display:flex;align-items:center;justify-content:space-between;padding:17px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .popup-title{font-size:15px;font-weight:800;}
    .popup-close{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;transition:all .12s;}
    .popup-close:hover{background:var(--red-soft);color:var(--red);border-color:transparent;}
    .popup-search{padding:11px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;}
    .popup-search input{flex:1;min-width:0;padding:8px 12px;border-radius:8px;border:1px solid var(--border-med);outline:none;font-size:13px;font-family:'Pretendard',sans-serif;background:var(--bg);transition:border-color .15s;}
    .popup-search input:focus{border-color:var(--mint-border);background:var(--bg-card);}
    .popup-search input::placeholder{color:var(--text-muted);}
    .popup-search-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border-med);background:var(--bg-alt);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-sub);font-family:'Pretendard',sans-serif;transition:all .12s;white-space:nowrap;flex-shrink:0;}
    .popup-search-btn:hover{border-color:var(--mint-border);background:var(--mint-soft);color:var(--mint);}
    .popup-list{flex:1;overflow-y:auto;padding:0;}
    .popup-list::-webkit-scrollbar{width:4px;}
    .popup-list::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    /* 결재자 팝업 — 테이블 스타일 */
    .popup-table-wrap{flex:1;overflow-y:auto;min-height:0;}
    .popup-table-wrap::-webkit-scrollbar{width:4px;}
    .popup-table-wrap::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px;}
    .popup-user-table{width:100%;border-collapse:collapse;}
    .popup-user-table thead th{background:var(--bg-alt);color:var(--text-sub);font-size:10px;font-weight:700;padding:6px 12px;border-bottom:1px solid var(--border-med);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1;}
    .popup-user-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);white-space:nowrap;}
    .popup-user-table tbody tr:last-child td{border-bottom:none;}
    .popup-item{cursor:pointer;transition:background .1s;}
    .popup-item:hover,.popup-item.selected{background:var(--mint-soft);}
    .popup-user-table .col-chk{width:36px;text-align:center;}
    .popup-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-med);background:var(--bg);display:inline-flex;align-items:center;justify-content:center;transition:all .12s;font-size:10px;font-weight:800;}
    .popup-item.selected .popup-check{background:var(--mint);border-color:var(--mint);color:#fff;}
    .popup-item.selected .popup-check::after{content:'✓';}
    /* 문서 보관함 목록 */
    .doc-search-field{padding:4px 6px;border-radius:6px;border:1px solid var(--border-med);font-size:11.5px;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);outline:none;flex-shrink:0;}
    .doc-list-header{display:flex;align-items:center;padding:5px 12px;background:var(--bg-alt);border-bottom:1px solid var(--border-med);flex-shrink:0;}
    .doc-list-header span{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.2px;white-space:nowrap;}
    .doc-col-no{width:90px;flex-shrink:0;text-align:center;}
    .doc-col-name{flex:1;min-width:0;text-align:center;}
    .doc-col-author{width:60px;flex-shrink:0;text-align:center;}
    .doc-col-date{width:80px;flex-shrink:0;text-align:center;}
    .doc-popup-item{display:flex;align-items:center;padding:6px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);}
    .doc-popup-item:last-child{border-bottom:none;}
    .doc-popup-item:hover,.doc-popup-item.selected{background:var(--mint-soft);}
    .doc-item-no{width:90px;font-size:11px;color:var(--text-muted);flex-shrink:0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .doc-item-name{flex:1;min-width:0;font-size:12px;font-weight:500;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;}
    .doc-item-author{width:60px;font-size:11px;color:var(--text-muted);flex-shrink:0;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .doc-item-date{width:80px;font-size:11px;color:var(--text-muted);flex-shrink:0;text-align:center;}
    .doc-pagination{display:flex;align-items:center;justify-content:center;gap:3px;padding:7px 12px;border-top:1px solid var(--border);flex-shrink:0;}
    .doc-page-btn{min-width:26px;height:26px;border-radius:5px;border:1px solid var(--border-med);background:var(--bg);cursor:pointer;font-size:11.5px;font-weight:600;color:var(--text-sub);padding:0 5px;font-family:'Pretendard',sans-serif;transition:all .12s;}
    .doc-page-btn:hover:not(:disabled){border-color:var(--mint-border);background:var(--mint-soft);color:var(--mint);}
    .doc-page-btn.active{background:var(--mint);border-color:var(--mint);color:#fff;}
    .doc-page-btn:disabled{opacity:.35;cursor:default;}
    .doc-page-ellipsis{font-size:11px;color:var(--text-muted);padding:0 3px;line-height:26px;}
    .popup-footer{padding:11px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .popup-footer-info{font-size:12px;color:var(--text-muted);}
    .popup-footer-info strong{color:var(--mint);font-weight:700;}
    .btn-popup-save{padding:8px 18px;border-radius:8px;border:none;background:var(--mint);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;transition:background .15s;}
    .btn-popup-save:hover{background:#1c7ed6;}
  </style>
</head>
<body>

<!-- 네비 -->
<header class="topnav">
  <object id="nav-logo-light" class="nav-logo-obj" data="../assets/images/logo-light-animated.svg" type="image/svg+xml"></object>
  <object id="nav-logo-dark"  class="nav-logo-obj" data="../assets/images/logo-dark-animated.svg"  type="image/svg+xml"></object>
  <span class="nav-title">홈<span class="sep">›</span><span class="crumb-cur">작업계획서 작성</span></span>
  <div class="topnav-right">
    <div class="profile-info">
      <span id="profile-name" class="profile-name"></span>
      <span id="profile-role" class="profile-role"></span>
    </div>
    <span id="company-name" class="company-name"></span>
    <div class="divider-v"></div>
    <img id="company-logo" class="company-logo" alt="" style="display:none;">
  </div>
</header>

<!-- 워크스페이스 -->
<div class="workspace">

  <!-- ── 왼쪽 ── -->
  <aside class="panel-left">

    <!-- 결재선 -->
    <div class="lsec lsec-approver">
      <div class="lsec-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12c0-2.2 1.8-4 4-4h4c2.2 0 4 1.8 4 4"/><circle cx="8" cy="5" r="3"/></svg>
        결재선 지정
      </div>
      <div class="approver-table-wrap">
        <table class="approver-table">
          <thead>
            <tr>
              <th class="col-seq">순서</th>
              <th class="col-name">결재자</th>
              <th class="col-rank">직급</th>
              <th class="col-type">구분</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="approverList"></tbody>
        </table>
      </div>
      <button class="btn-add" onclick="openPopup('approver')">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        결재자 추가
      </button>
    </div>

    <!-- 참조 문서 -->
    <div class="lsec lsec-ref">
      <div class="lsec-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6l-4-4z"/><path d="M9 2v4h4"/></svg>
        참조 문서
      </div>
      <div class="ref-doc-wrap"><div id="refDocList"></div></div>
      <button class="btn-add" onclick="openPopup('doc')">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        문서 불러오기
      </button>
    </div>

    <!-- 작업 대상 입력 -->
    <div class="lsec lsec-target">
      <div class="lsec-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2"/></svg>
        작업 대상
      </div>
      <input type="text" class="nl-target" id="nlTarget">
    </div>

    <!-- 작업 내용 입력 -->
    <div class="lsec lsec-nl">
      <div class="lsec-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M2 7h8M2 10h10M2 13h6"/></svg>
        작업 내용
      </div>
      <textarea class="nl-textarea" id="nlInput"></textarea>
      <button class="btn-generate" id="btnGenerate" onclick="generateDoc()">문서 작성</button>
    </div>
  </aside>

  <!-- ── 가운데 ── -->
  <section class="panel-center">
    <div class="center-topbar">
      <button class="btn-cancel" onclick="history.back()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
        취소
      </button>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
        <button class="btn-tf" id="btnTf" onclick="generateTerraform()" disabled>Terraform 코드 생성</button>
        <button class="btn-save" onclick="saveDoc()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2h8l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M5 2v4h6V2M5 9h6"/></svg>
          저장
        </button>
      </div>
    </div>

    <div class="doc-editor" id="docEditor">
      <!-- 빈 상태: 아무것도 없음 -->
      <div class="doc-blank" id="docBlank"></div>

      <!-- 생성 중 로딩 -->
      <div class="doc-loading" id="docLoading" style="display:none;">
        <div class="loading-shimmer-wrap">
          <div class="shimmer shimmer-title"></div>
          <div class="shimmer shimmer-meta" style="margin-bottom:12px;"></div>
          <div class="shimmer shimmer-line w90"></div>
          <div class="shimmer shimmer-line w80"></div>
          <div class="shimmer shimmer-line w95"></div>
          <div class="shimmer shimmer-line w70" style="margin-bottom:12px;"></div>
          <div class="shimmer shimmer-block" style="height:72px;border-radius:8px;margin-bottom:12px;"></div>
          <div class="shimmer shimmer-line w90"></div>
          <div class="shimmer shimmer-line w75" style="width:75%;"></div>
          <div class="shimmer shimmer-line w80"></div>
        </div>
        <div class="loading-label">계획서 생성 중...</div>
      </div>

      <!-- 계획서 본문 -->
      <iframe id="docContent"
        src="../assets/mock/plan-sample.html"
        style="display:none;width:100%;border:none;min-height:1300px;"
        frameborder="0"
        onload="try{this.style.height=this.contentDocument.body.scrollHeight+'px';}catch(e){}"></iframe>
    </div>
  </section>

  <!-- ── 오른쪽: Terraform ── -->
  <aside class="panel-right">
    <!-- 빈 상태: 아무것도 없음 -->
    <div class="tf-blank" id="tfBlank"></div>

    <!-- 코드 생성 중 로딩 -->
    <div class="tf-loading" id="tfLoading" style="display:none;">
      <div class="tf-shimmer-wrap">
        <div class="tf-block-mock">
          <div class="tf-shimmer h12 w60"></div>
          <div class="tf-shimmer h12 w95"></div>
          <div class="tf-shimmer h12 w80"></div>
          <div class="tf-shimmer h12 w70"></div>
          <div class="tf-shimmer h12 w95"></div>
          <div class="tf-shimmer h12 w50"></div>
        </div>
        <div class="tf-block-mock" style="margin-top:4px;">
          <div class="tf-shimmer h12 w70"></div>
          <div class="tf-shimmer h12 w80"></div>
          <div class="tf-shimmer h12 w60"></div>
        </div>
      </div>
      <div class="tf-loading-label">코드 생성 중...</div>
    </div>

    <!-- 코드 에디터 — 탭 뷰 -->
    <div class="tf-code-area" id="tfCodeArea" style="display:none;">
      <div class="tf-tabs-bar">
        <button class="tf-tab active" onclick="switchTab(0)">eks_node_group.tf</button>
        <button class="tf-tab" onclick="switchTab(1)">variables.tf</button>
      </div>
      <div class="tf-code-scroll">
        <div class="tf-tab-panel active">
          <textarea class="tf-editor" spellcheck="false">resource "aws_eks_node_group" "production_ng" {
  cluster_name    = aws_eks_cluster.main.name
  node_group_name = "production-ng"
  node_role_arn   = aws_iam_role.node.arn
  subnet_ids      = var.private_subnet_ids

  instance_types = ["t3.large"]

  scaling_config {
    desired_size = 3
    min_size     = 2
    max_size     = 6
  }

  update_config {
    max_unavailable = 1
  }

  tags = {
    Environment = "production"
    ManagedBy   = "terraform"
  }
}</textarea>
        </div>
        <div class="tf-tab-panel">
          <textarea class="tf-editor" spellcheck="false">variable "node_instance_type" {
  description = "EKS 노드 인스턴스 타입"
  type        = string
  default     = "t3.large"
}

variable "rollback_instance_type" {
  description = "롤백용 인스턴스 타입 (t3.medium)"
  type        = string
  default     = "t3.medium"
}</textarea>
        </div>
      </div>
    </div>
    <div class="tf-statusbar">
      <div class="tf-log-header">
        <div class="tf-status pending" id="tfStatus">
          <div class="tf-dot"></div>
          <span id="tfStatusText">대기 중</span>
        </div>
        <button class="tf-revalidate-btn" onclick="revalidate()" title="재검증">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/>
            <polyline points="13.5 2.5 13.5 8 8 8"/>
          </svg>
        </button>
      </div>
      <div class="tf-log-panel active" id="tfLogPanel0"></div>
      <div class="tf-log-panel" id="tfLogPanel1"></div>
    </div>
  </aside>
</div>

<!-- 팝업: 결재자 추가 -->
<div class="popup-overlay" id="approverPopup" onclick="if(event.target.id==='approverPopup')closePopup('approverPopup')">
  <div class="popup popup-wide">
    <div class="popup-header"><span class="popup-title">결재자 추가</span><button class="popup-close" onclick="closePopup('approverPopup')">×</button></div>
    <div class="apv-popup-body">
      <!-- 왼쪽: 조직도 -->
      <div class="apv-left">
        <div class="apv-left-search">
          <input type="text" id="apvSearchInput" placeholder="이름 또는 부서 검색" onkeydown="if(event.key==='Enter')filterOrgMembers(this.value)">
          <button class="apv-search-btn" onclick="filterOrgMembers(document.getElementById('apvSearchInput').value)">검색</button>
        </div>
        <div class="apv-tree" id="apvTree"></div>
      </div>
      <!-- 가운데: 화살표 -->
      <div class="apv-mid">
        <button class="apv-move-btn" onclick="moveToRight()">›</button>
      </div>
      <!-- 오른쪽: 대기 목록 -->
      <div class="apv-right">
        <div class="apv-right-list" id="apvPendingList"></div>
      </div>
    </div>
    <div class="popup-footer">
      <div class="popup-footer-info">대기: <strong id="aCount">0</strong>명</div>
      <button class="btn-popup-save" onclick="saveApprovers()">저장</button>
    </div>
  </div>
</div>

<!-- 팝업: 문서 불러오기 -->
<div class="popup-overlay" id="docPopup" onclick="if(event.target.id==='docPopup')closePopup('docPopup')">
  <div class="popup popup-doc">
    <div class="popup-header"><span class="popup-title">문서 불러오기</span><button class="popup-close" onclick="closePopup('docPopup')">×</button></div>
    <div class="popup-search">
      <select id="docSearchField" class="doc-search-field">
        <option value="name">제목</option>
        <option value="author">작성자</option>
      </select>
      <input type="text" id="docSearchInput" placeholder="검색어 입력" onkeydown="if(event.key==='Enter')filterDocs()">
      <button class="popup-search-btn" onclick="filterDocs()">검색</button>
    </div>
    <div class="doc-list-header">
      <span class="doc-col-no">문서번호</span>
      <span class="doc-col-name">제목</span>
      <span class="doc-col-author">작성자</span>
      <span class="doc-col-date">등록일</span>
    </div>
    <div class="popup-list" id="docItems"></div>
    <div class="doc-pagination" id="docPagination"></div>
    <div class="popup-footer">
      <button class="btn-popup-save" onclick="saveDocs()">불러오기</button>
    </div>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/mock/mock.js"></script>
<script>
  /* ═══════════════════════════════════
     팝업 유틸
  ═══════════════════════════════════ */
  function closePopup(id) { document.getElementById(id).classList.remove('open'); }

  function openPopup(t) {
    if (t === 'approver') {
      pendingApprovers = [];
      orgSelected = new Set();
      expandedDepts = new Set();
      document.getElementById('apvSearchInput').value = '';
      renderOrgTree('');
      renderPending();
      document.getElementById('aCount').textContent = '0';
      document.getElementById('approverPopup').classList.add('open');
    } else {
      selectedDocs = new Set();
      document.getElementById('docSearchInput').value = '';
      document.getElementById('docSearchField').value = 'name';
      docFilter = { field: 'name', q: '' };
      docPage = 1;
      renderDocList();
      document.getElementById('docPopup').classList.add('open');
    }
  }

  /* ═══════════════════════════════════
     문서 보관함
  ═══════════════════════════════════ */
  const DOC_PAGE_SIZE = 8;
  let docPage = 1;
  let docFilter = { field: 'name', q: '' };
  let selectedDocs = new Set();

  function getFilteredDocs() {
    return docData.filter(d => {
      if (!docFilter.q) return true;
      const val = docFilter.field === 'author' ? d.author : d.name;
      return val.toLowerCase().includes(docFilter.q);
    });
  }

  function renderDocList() {
    const filtered = getFilteredDocs();
    const totalPages = Math.max(1, Math.ceil(filtered.length / DOC_PAGE_SIZE));
    if (docPage > totalPages) docPage = totalPages;
    const start = (docPage - 1) * DOC_PAGE_SIZE;
    const items = filtered.slice(start, start + DOC_PAGE_SIZE);
    const list = document.getElementById('docItems');
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<div style="padding:24px;text-align:center;font-size:12px;color:var(--text-muted);">검색 결과가 없습니다.</div>';
      renderDocPagination(0);
      return;
    }
    items.forEach(d => {
      const div = document.createElement('div');
      div.className = 'doc-popup-item' + (selectedDocs.has(d.no) ? ' selected' : '');
      div.dataset.no = d.no;
      div.onclick = function() { toggleDocSel(this); };
      div.innerHTML = `<div class="doc-item-no">${d.no}</div><div class="doc-item-name">${d.name}</div><div class="doc-item-author">${d.author}</div><div class="doc-item-date">${d.date}</div>`;
      list.appendChild(div);
    });
    renderDocPagination(totalPages);
  }

  function renderDocPagination(totalPages) {
    const pg = document.getElementById('docPagination');
    pg.innerHTML = '';
    if (totalPages <= 1) return;
    const mk = (label, page, active, disabled) => {
      const btn = document.createElement('button');
      btn.className = 'doc-page-btn' + (active ? ' active' : '');
      btn.textContent = label;
      btn.disabled = disabled || false;
      btn.onclick = () => { docPage = page; renderDocList(); };
      return btn;
    };
    pg.appendChild(mk('‹', docPage - 1, false, docPage === 1));
    const range = [];
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - docPage) <= 1) range.push(i);
      else if (range[range.length - 1] !== '…') range.push('…');
    }
    range.forEach(r => {
      if (r === '…') { const s = document.createElement('span'); s.className = 'doc-page-ellipsis'; s.textContent = '…'; pg.appendChild(s); }
      else pg.appendChild(mk(r, r, r === docPage));
    });
    pg.appendChild(mk('›', docPage + 1, false, docPage === totalPages));
  }

  function toggleDocSel(el) {
    const no = el.dataset.no;
    const wasSelected = selectedDocs.has(no);
    selectedDocs = new Set();
    document.querySelectorAll('#docItems .doc-popup-item').forEach(i => i.classList.remove('selected'));
    if (!wasSelected) { selectedDocs.add(no); el.classList.add('selected'); }
  }

  function filterDocs() {
    docFilter.field = document.getElementById('docSearchField').value;
    docFilter.q = document.getElementById('docSearchInput').value.toLowerCase().trim();
    docPage = 1;
    renderDocList();
  }

  function saveDocs() {
    const list = document.getElementById('refDocList');
    selectedDocs.forEach(no => {
      const d = docData.find(x => x.no === no);
      if (!d) return;
      const div = document.createElement('div');
      div.className = 'ref-doc-item';
      div.innerHTML = `<div class="ref-doc-name">${d.no} — ${d.name}</div><button class="ref-doc-remove" onclick="this.closest('.ref-doc-item').remove()">×</button>`;
      list.appendChild(div);
    });
    selectedDocs = new Set();
    closePopup('docPopup');
  }

  /* ═══════════════════════════════════
     결재자 팝업
  ═══════════════════════════════════ */
  let pendingApprovers = [];
  let orgSelected = new Set();
  let expandedDepts = new Set();

  function renderOrgTree(q) {
    const tree = document.getElementById('apvTree');
    tree.innerHTML = '';
    const sq = q.toLowerCase();
    const isSearching = sq.length > 0;
    orgData.forEach(dept => {
      const members = dept.members.filter(m =>
        !sq || m.name.toLowerCase().includes(sq) || dept.dept.toLowerCase().includes(sq)
      );
      if (!members.length) return;
      const isOpen = isSearching || expandedDepts.has(dept.dept);
      const header = document.createElement('div');
      header.className = 'org-dept-header' + (isOpen ? ' open' : '');
      header.innerHTML = `<span class="org-dept-name">${dept.dept}</span><span class="org-dept-count">${members.length}</span><span class="org-dept-chevron">›</span>`;
      header.onclick = () => toggleDept(dept.dept);
      tree.appendChild(header);
      const body = document.createElement('div');
      body.className = 'org-dept-body' + (isOpen ? ' open' : '');
      members.forEach(m => {
        const isSelected = orgSelected.has(m.name);
        const isDisabled = approvers.some(a => a.name === m.name) || pendingApprovers.some(p => p.name === m.name);
        const div = document.createElement('div');
        div.className = 'org-member' + (isSelected ? ' selected' : '') + (isDisabled ? ' disabled' : '');
        div.innerHTML = `<div class="org-check"></div><span class="org-name">${m.name}</span><span class="org-rank">${m.rank}</span>`;
        if (!isDisabled) div.onclick = () => toggleOrgSel(m.name);
        body.appendChild(div);
      });
      tree.appendChild(body);
    });
  }

  function toggleDept(deptName) {
    if (expandedDepts.has(deptName)) expandedDepts.delete(deptName);
    else expandedDepts.add(deptName);
    renderOrgTree(document.getElementById('apvSearchInput').value);
  }

  function filterOrgMembers(q) { renderOrgTree(q); }

  function toggleOrgSel(name) {
    if (orgSelected.has(name)) orgSelected.delete(name);
    else orgSelected.add(name);
    renderOrgTree(document.getElementById('apvSearchInput').value);
  }

  function moveToRight() {
    if (!orgSelected.size) return;
    orgSelected.forEach(name => {
      if (pendingApprovers.some(p => p.name === name)) return;
      let rank = '';
      orgData.forEach(dept => { const m = dept.members.find(m => m.name === name); if (m) rank = m.rank; });
      pendingApprovers.push({ name, rank, type: '결재' });
    });
    orgSelected.clear();
    renderOrgTree(document.getElementById('apvSearchInput').value);
    renderPending();
  }

  function renderPending() {
    const list = document.getElementById('apvPendingList');
    document.getElementById('aCount').textContent = pendingApprovers.length;
    list.innerHTML = '';
    pendingApprovers.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'apv-pending-row';
      row.innerHTML = `<span class="apv-pending-name">${p.name}</span><select class="apv-pending-type" onchange="pendingApprovers[${i}].type=this.value"><option${p.type==='결재'?' selected':''}>결재</option><option${p.type==='협조'?' selected':''}>협조</option><option${p.type==='참조'?' selected':''}>참조</option></select><button class="apv-pending-del" onclick="removePending(${i})">×</button>`;
      list.appendChild(row);
    });
  }

  function removePending(i) {
    pendingApprovers.splice(i, 1);
    renderOrgTree(document.getElementById('apvSearchInput').value);
    renderPending();
  }

  /* ═══════════════════════════════════
     결재선
  ═══════════════════════════════════ */
  let authorInfo = { name: '', rank: '' };
  let approvers = [];

  function renderApprovers() {
    const list = document.getElementById('approverList');
    list.innerHTML = '';
    const authorTr = document.createElement('tr');
    authorTr.className = 'approver-row approver-fixed';
    authorTr.innerHTML = `<td class="col-seq">0</td><td class="col-name">${authorInfo.name || '—'}</td><td class="col-rank">${authorInfo.rank || '—'}</td><td class="col-type">기안</td><td class="col-del"></td>`;
    list.appendChild(authorTr);
    const typeOrder = ['결재', '협조', '참조'];
    let isFirst = true;
    typeOrder.forEach(type => {
      const rows = approvers.filter(a => a.type === type);
      if (!rows.length) return;
      rows.forEach((a, i) => {
        const idx = approvers.indexOf(a);
        const tr = document.createElement('tr');
        tr.className = 'approver-row';
        if (i === 0 && !isFirst) tr.classList.add('group-start');
        tr.innerHTML = `<td class="col-seq">${type === '결재' ? i + 1 : '—'}</td><td class="col-name">${a.name}</td><td class="col-rank">${a.rank}</td><td class="col-type">${a.type}</td><td class="col-del"><button class="approver-remove" onclick="removeApprover(${idx})">×</button></td>`;
        list.appendChild(tr);
      });
      isFirst = false;
    });
    if (isFirst) {
      const tr = document.createElement('tr');
      tr.className = 'approver-empty';
      list.appendChild(tr);
    }
  }

  function saveApprovers() {
    pendingApprovers.forEach(p => approvers.push({ name: p.name, rank: p.rank, type: p.type }));
    pendingApprovers = [];
    orgSelected = new Set();
    closePopup('approverPopup');
    renderApprovers();
  }

  function removeApprover(idx) {
    approvers.splice(idx, 1);
    renderApprovers();
  }

  renderApprovers();

  /* ═══════════════════════════════════
     계획서 생성
  ═══════════════════════════════════ */
  function generateDoc() {
    const editor = document.getElementById('docEditor');
    editor.classList.remove('has-doc');
    document.getElementById('docBlank').style.display = 'none';
    document.getElementById('docLoading').style.display = 'flex';
    document.getElementById('docContent').style.display = 'none';
    document.getElementById('btnGenerate').disabled = true;
    setTimeout(() => {
      document.getElementById('docLoading').style.display = 'none';
      const iframe = document.getElementById('docContent');
      iframe.style.display = 'block';
      editor.classList.add('has-doc');
      try { iframe.style.height = iframe.contentDocument.body.scrollHeight + 'px'; } catch(e) {}
      document.getElementById('btnTf').disabled = false;
      document.getElementById('btnGenerate').disabled = false;
    }, 2200);
  }

  function saveDoc() {
    if (document.getElementById('docContent').style.display === 'none') { alert('저장할 계획서가 없습니다.'); return; }
    window.location.href = '문서열람.html';
  }

  /* ═══════════════════════════════════
     Terraform 코드 에디터
  ═══════════════════════════════════ */
  function addLog(msg, type = 'info', tabIdx = 0) {
    const panel = document.getElementById('tfLogPanel' + tabIdx);
    if (!panel) return;
    const now = new Date();
    const t = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
    const entry = document.createElement('div');
    entry.className = 'tf-log-entry log-' + type;
    entry.innerHTML = `<span class="tf-log-time">${t}</span><div class="tf-log-dot"></div><span class="tf-log-msg">${msg}</span>`;
    panel.appendChild(entry);
    panel.scrollTop = panel.scrollHeight;
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

  function initEditors(root) {
    (root || document).querySelectorAll('.tf-editor').forEach(el => {
      if (el.dataset.init) return;
      el.dataset.init = '1';
      autoResize(el);
      el.addEventListener('input', () => autoResize(el));
      el.addEventListener('keydown', e => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const s = el.selectionStart, en = el.selectionEnd;
          el.value = el.value.substring(0, s) + '  ' + el.value.substring(en);
          el.selectionStart = el.selectionEnd = s + 2;
        }
      });
    });
  }

  function switchTab(idx) {
    document.querySelectorAll('.tf-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    document.querySelectorAll('.tf-tab-panel').forEach((p, i) => {
      p.classList.toggle('active', i === idx);
      if (i === idx) { initEditors(p); p.querySelectorAll('.tf-editor').forEach(el => autoResize(el)); }
    });
    document.querySelectorAll('.tf-log-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  }

  function runValidation() {
    const st = document.getElementById('tfStatus');
    st.className = 'tf-status generating';
    document.getElementById('tfStatusText').textContent = '보안 검증 중';
    addLog('보안 검증 중...', 'run', 0);
    addLog('보안 검증 중...', 'run', 1);
    setTimeout(() => {
      addLog('보안 검증 통과', 'ok', 0);
      addLog('보안 검증 통과', 'ok', 1);
      document.getElementById('tfStatusText').textContent = '비용 분석 중';
      addLog('비용 분석 중...', 'run', 0);
      addLog('비용 분석 중...', 'run', 1);
      setTimeout(() => {
        addLog('예상 추가 비용 $14.24/월 (t3.large 기준)', 'info', 0);
        addLog('예상 추가 비용 $14.24/월 (t3.large 기준)', 'info', 1);
        document.getElementById('tfStatusText').textContent = '정책 검증 중';
        addLog('정책 검증 중...', 'run', 0);
        addLog('정책 검증 중...', 'run', 1);
        setTimeout(() => {
          addLog('정책 검증 통과', 'ok', 0);
          addLog('정책 검증 통과', 'ok', 1);
          st.className = 'tf-status ok';
          document.getElementById('tfStatusText').textContent = '검증 완료';
          document.getElementById('btnTf').disabled = false;
        }, 900);
      }, 900);
    }, 900);
  }

  function generateTerraform() {
    const st = document.getElementById('tfStatus');
    document.getElementById('tfBlank').style.display = 'none';
    document.getElementById('tfLoading').style.display = 'flex';
    document.getElementById('tfCodeArea').style.display = 'none';
    document.getElementById('btnTf').disabled = true;
    st.className = 'tf-status generating';
    document.getElementById('tfStatusText').textContent = '코드 생성 중';
    addLog('작업 계획서 분석 중...', 'muted', 0);
    addLog('변경 대상 리소스 추출 중...', 'run', 0);
    setTimeout(() => {
      document.getElementById('tfLoading').style.display = 'none';
      document.getElementById('tfCodeArea').style.display = 'flex';
      switchTab(0);
      addLog('eks_node_group.tf 생성 완료', 'ok', 0);
      addLog('instance_types: t3.medium → t3.large', 'info', 0);
      addLog('variables.tf 생성 완료', 'ok', 1);
      addLog('node_instance_type, rollback_instance_type 추가', 'info', 1);
      runValidation();
    }, 1800);
  }

  function revalidate() {
    [0, 1].forEach(i => {
      const p = document.getElementById('tfLogPanel' + i);
      if (p) p.innerHTML = '';
    });
    runValidation();
  }

  initEditors();

  /* ═══════════════════════════════════
     세션 정보 — mock.js 로드 후 실행됨
  ═══════════════════════════════════ */
  document.getElementById('profile-name').textContent = session.name;
  document.getElementById('profile-role').textContent  = session.role;
  document.getElementById('company-name').textContent  = session.company.name;
  if (session.company.logoUrl) {
    const isDark = document.documentElement.classList.contains('dark');
    const logoSrc = (isDark && session.company.logoDarkUrl) ? session.company.logoDarkUrl : session.company.logoUrl;
    const logo = document.getElementById('company-logo');
    logo.src = logoSrc;
    logo.style.display = 'block';
  }
  authorInfo.name = session.name;
  authorInfo.rank  = session.role;
  renderApprovers();
</script>
</body>
</html>
